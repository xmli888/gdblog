<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自定义字体最终版</title>
    <style>
        @font-face {
            font-family: "YuWeiShuXing";
            src: url("./myzt/禹卫书法行书简体.ttf") format("truetype");
            font-weight: normal;
            font-style: normal;
            /* 核心配置：必须等待字体加载完毕再渲染文字，绝对不会回退系统字体 */
            font-display: block;
            /* 囊括全部中英文Unicode编码 */
            unicode-range: U+0000-FFFF;
            /* 规避部分浏览器字体安全校验 */
            src-local: none;
        }
        /* 采用最高优先级，强制全部标签应用字体，彻底删掉所有系统备选字体 */
        html,body,div,p,span,h1,h2,h3{
            font-family: "YuWeiShuXing" !important;
        }
        body {
            max-width: 800px;
            margin: 3rem auto;
            padding: 0 20px;
            font-size: 22px;
            line-height: 2;
            color: #222;
            background-color: #f8f8f8;
        }
        .title {
            font-size: 32px;
            text-align: center;
            margin-bottom: 40px;
        }
        .tip-box {
            padding:15px;
            border:1px solid #999;
            border-radius:12px;
            background:#fff;
            margin-bottom:30px;
        }
    </style>
</head>
<body>
    <div class="tip-box">
        <p>设备检测提示：<span id="deviceInfo"></span></p>
        <p>字体加载状态：<span id="fontStatus">加载中……</span></p>
        <p>字体探测结果：<span id="detectResult">等待检测</span></p>
        <p>重要提示：字体加载失败文字会空白，不会自动切换设备自带字体</p>
    </div>

    <h2 class="title">山野随笔（自定义字体展示文本）</h2>
    <div>
        <p>晨起缓步走入山间，薄雾缠绕连绵的青峰，清风穿过林间枝叶，携带着草木独有的清香。尘世里诸多琐碎烦忧，走到自然之中便慢慢消散无踪。</p>
        <p>溪流顺着山石蜿蜒流淌，水底卵石清晰可见，几只飞鸟掠过长空，落于溪边老树的枝桠之上。人这一生，不必执着于得失浮沉，守一份平和心境，接纳岁月所有馈赠，便是难得的自在。</p>
        <p>落日垂向远山的时候，整片山野染上温润的橘黄色霞光，晚风渐凉，步履缓缓归途。纵使前路尚有风雨，心怀温柔，便随处可见世间美好风光。</p>
    </div>

    <script>
        const userAgent = navigator.userAgent;
        let deviceText = "";
        if (/Android|iPhone|iPad|iPod/.test(userAgent)) {
            deviceText = "移动手机设备";
        } else {
            deviceText = "台式电脑设备";
        }
        document.getElementById("deviceInfo").innerText = `${deviceText}`;

        document.fonts.ready.then(()=>{
            document.getElementById("fontStatus").innerText = "字体文件已完成网络请求";
            if(document.fonts.check("22px YuWeiShuXing")){
                document.getElementById("detectResult").innerText = "✅ 自定义字体正常渲染";
            }else{
                document.getElementById("detectResult").innerText = "❌ 浏览器无法解析TTF字体文件";
            }
        }).catch(()=>{
            document.getElementById("fontStatus").innerText = "❌ 字体请求异常";
            document.getElementById("detectResult").innerText = "资源加载失败";
        })
    </script>
</body>
</html>
