<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>墨韵轩 · 后台管理</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background-color: #f6efe8;
            font-family: '华文楷体','KaiTi','SimSun','宋体', serif;
            color: #3e2723;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-box {
            max-width:420px;
            width:100%;
            margin:0 auto;
            padding:30px 28px 40px;
            background:#fdf8f0;
            border:1px solid #e8d5c0;
            border-radius:12px;
            box-shadow:0 4px 20px rgba(0,0,0,0.06);
            text-align:center;
        }
        .login-box h2 {
            font-weight:normal;
            letter-spacing:6px;
            font-family:'华文楷体','KaiTi',serif;
            color:#4d281b;
            margin-bottom:8px;
        }
        .login-box .login-sub {
            color:#8a7a6a;
            font-size:14px;
            margin-bottom:24px;
        }
        .login-box .form-group {
            margin-bottom:24px;
            text-align:left;
        }
        .login-box .form-group label {
            display:block;
            font-size:14px;
            color:#4d281b;
            font-weight:bold;
            margin-bottom:6px;
            text-align:center;
        }
        .login-box .form-group textarea {
            width:100%;
            padding:12px 14px;
            border:1px solid #ddd0c0;
            border-radius:6px;
            background:#fefcf8;
            font-size:14px;
            font-family:'Courier New',monospace;
            resize:vertical;
            min-height:100px;
            outline:none;
        }
        .login-box .form-group textarea:focus {
            border-color:#c23531;
        }
        .login-box .btn {
            width:100%;
            padding:14px;
            background:#c23531;
            color:#f5e6d3;
            border:none;
            border-radius:6px;
            font-size:16px;
            font-family:'华文楷体','KaiTi',serif;
            letter-spacing:4px;
            cursor:pointer;
            transition:0.2s;
        }
        .login-box .btn:hover {
            background:#a02a26;
        }
        .login-box .error-msg {
            color:#c23531;
            text-align:center;
            margin-top:16px;
            padding:10px;
            border-radius:4px;
            background:#fdf0f0;
            display:none;
            font-size:14px;
        }
        .login-box .error-msg.show {
            display:block;
        }
        .login-box .success-msg {
            color:#2a7a4a;
            text-align:center;
            margin-top:16px;
            padding:10px;
            border-radius:4px;
            background:#e8f5e9;
            display:none;
            font-size:14px;
        }
        .login-box .success-msg.show {
            display:block;
        }
        .login-box .info-msg {
            color:#666;
            text-align:center;
            margin-top:16px;
            padding:10px;
            border-radius:4px;
            background:#f5f5f5;
            display:none;
            font-size:14px;
        }
        .login-box .info-msg.show {
            display:block;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>🔐 后台登录</h2>
        <div class="login-sub">— 使用私钥验证身份 —</div>
        <div class="form-group">
            <label>🔑 私钥 (PEM 格式)</label>
            <textarea id="loginPrivateKey" rows="4" placeholder="-----BEGIN PRIVATE KEY----- ... -----END PRIVATE KEY-----"></textarea>
        </div>
        <button class="btn" onclick="doLogin()">登录</button>
        <div id="loginError" class="error-msg"></div>
        <div id="loginSuccess" class="success-msg"></div>
        <div id="loginInfo" class="info-msg"></div>
        <div style="margin-top:20px;font-size:13px;color:#8a7a6a;">
            <a href="index.html" style="color:#c23531;text-decoration:underline;">← 返回首页</a>
        </div>
    </div>

    <script src="common.js"></script>
    <script>
        function doLogin() {
            var privKey = document.getElementById('loginPrivateKey').value.trim();
            var errorEl = document.getElementById('loginError');
            var successEl = document.getElementById('loginSuccess');
            var infoEl = document.getElementById('loginInfo');

            errorEl.className = 'error-msg';
            errorEl.style.display = 'none';
            successEl.className = 'success-msg';
            successEl.style.display = 'none';
            infoEl.className = 'info-msg';
            infoEl.style.display = 'none';

            if (!privKey) {
                errorEl.textContent = '❌ 请输入您的安全密钥';
                errorEl.className = 'error-msg show';
                errorEl.style.display = 'block';
                return;
            }

            if (!privKey.includes('-----BEGIN PRIVATE KEY-----') || !privKey.includes('-----END PRIVATE KEY-----')) {
                errorEl.textContent = '❌ 安全密钥格式不正确，请检查后重试';
                errorEl.className = 'error-msg show';
                errorEl.style.display = 'block';
                return;
            }

            infoEl.textContent = '⏳ 正在验证，请稍候...';
            infoEl.className = 'info-msg show';
            infoEl.style.display = 'block';

            var stored = localStorage.getItem('security_config');
            var security = stored ? JSON.parse(stored) : null;

            if (!security || !security.challengeCipher || !security.expectedPlain) {
                if (DEFAULT_CONFIG.security && DEFAULT_CONFIG.security.challengeCipher) {
                    security = DEFAULT_CONFIG.security;
                    localStorage.setItem('security_config', JSON.stringify(security));
                } else {
                    infoEl.style.display = 'none';
                    errorEl.textContent = '❌ 安全配置缺失，请检查 config.json';
                    errorEl.className = 'error-msg show';
                    errorEl.style.display = 'block';
                    return;
                }
            }

            hybridDecrypt(security.challengeCipher, privKey)
                .then(function(plain) {
                    if (plain === security.expectedPlain) {
                        infoEl.style.display = 'none';
                        successEl.textContent = '✅ 验证通过，正在加载...';
                        successEl.className = 'success-msg show';
                        successEl.style.display = 'block';
                        sessionStorage.setItem('blog_admin_logged', 'true');
                        setTimeout(function() {
                            window.location.href = 'admin_full.html';
                        }, 500);
                    } else {
                        infoEl.style.display = 'none';
                        errorEl.textContent = '❌ 安全验证失败，请检查您输入的密钥是否正确。';
                        errorEl.className = 'error-msg show';
                        errorEl.style.display = 'block';
                    }
                })
                .catch(function(err) {
                    infoEl.style.display = 'none';
                    errorEl.textContent = '❌ 安全验证失败，请检查您输入的密钥是否正确。';
                    errorEl.className = 'error-msg show';
                    errorEl.style.display = 'block';
                });
        }
    </script>
</body>
</html>
