                    }
                };
                loadAllData().then(function() {
                    renderAdminPanel();
                    renderAdminList();
                    populateCategorySelect();
                    populateTagAdminList();
                    renderMessageAdminList();
                    loadSecuritySettings();
                    loadSiteSettingsForm();
                    loadFontSettingsForm();
                    loadMusicSettingsForm();
                    var aboutEditor = document.getElementById('aboutEditor');
                    if (aboutEditor) aboutEditor.value = aboutContent;
                    var tokenInput = document.getElementById('githubTokenInput');
                    var userInput = document.getElementById('githubUserInput');
                    var repoInput = document.getElementById('githubRepoInput');
                    if (tokenInput) tokenInput.value = config.token;
                    if (userInput) userInput.value = config.user;
                    if (repoInput) repoInput.value = config.repo;
                    var statusEl = document.getElementById('githubConfigStatus');
                    if (statusEl) statusEl.textContent = isConfigured() ? '✅ 已配置' : '⚠️ 未配置，请填写';
                    var lastBackupEl = document.getElementById('lastBackupTime');
                    if (lastBackupEl) lastBackupEl.textContent = lastBackupTime || '暂无';
                    document.getElementById('mainContent').innerHTML = '';
                });
                renderPage(currentPage);
            } else {
                document.getElementById('footerAdminTrigger').textContent = '⚙️ 管理';
                document.getElementById('footerAdminTrigger').onclick = function() {
                    if (sessionStorage.getItem('blog_admin_logged') === 'true') {
                        toggleAdmin(true);
                        return;
                    }
                    showLoginModal();
                };
                sessionStorage.removeItem('blog_admin_logged');
                showToast('已退出', 'info');
                document.getElementById('mainContent').innerHTML = '';
                renderPage(currentPage);
                if (window.history && window.history.pushState) {
                    window.history.pushState(null, '', window.location.pathname);
                }
            }
        }

        if (sessionStorage.getItem('blog_admin_logged') === 'true') {
            toggleAdmin(true);
        }

            var html = '';
            sorted.forEach(function(p) {
                html += '<div class="item">';
                html += '<span>' + escapeHtml(p.title) + ' <span style="color:#8a7a6a;font-size:12px;">(' + p.date +
                    ')</span></span>';
                html += '<div class="actions">';
                html += '<button class="edit" onclick="editPost(' + p.id + ')">编辑</button>';
                html += '<button class="del" onclick="deletePost(' + p.id + ')">删除</button>';
                html += '</div></div>';
            });
            container.innerHTML = html || '<p style="color:#8a7a6a;">暂无文章</p>';
        }

        function populateCategorySelect() {
            var sel = document.getElementById('editCategory');
            if (!sel) return;
            var cats = categories.length ? categories : ['随笔', '书评', '游记', '散文', '诗词', '其他'];
            var html = '';
            cats.forEach(function(c) { html += '<option value="' + escapeHtml(c) + '">' + escapeHtml(c) + '</option>'; });
            sel.innerHTML = html;
        }

        function quickAddCategory() {
            var name = document.getElementById('newCategoryQuick').value.trim();
            if (!name) { showToast('请输入分类名称', 'error'); return; }
            if (categories.indexOf(name) !== -1) { showToast('分类已存在', 'error'); return; }
            categories.push(name);
            saveConfigData().then(function() {
                populateCategorySelect();
                document.getElementById('editCategory').value = name;
                document.getElementById('newCategoryQuick').value = '';
                renderCategoryAdmin();
                showToast('分类已添加', 'success');
            });
        }

            document.getElementById('editTitle').value = '';

            document.getElementById('editContent').value = '';
            document.getElementById('editDate').value = getToday();
            document.getElementById('editViews').value = 0;
            document.getElementById('editLikes').value = 0;
            document.getElementById('editAuthor').value = siteSettings.authorName || '';
            document.getElementById('editTitle').focus();

        function editPost(id) {
            var post = posts.find(function(p) { return p.id === id; });
            if (!post) return;
            document.getElementById('editId').value = post.id;
            document.getElementById('editTitle').value = post.title;
            document.getElementById('editCategory').value = post.category;
            document.getElementById('editTags').value = post.tags ? post.tags.join(',') : '';
            document.getElementById('editContent').value = post.content;
            document.getElementById('editDate').value = post.date || getToday();
            document.getElementById('editViews').value = post.views || 0;
            document.getElementById('editLikes').value = post.likes || 0;
            document.getElementById('editAuthor').value = post.author || siteSettings.authorName || '';
            var np = document.getElementById('newPostPanel');
            var nb = np.querySelector('.panel-body');
            var na = np.querySelector('.arrow');
            if (!nb.classList.contains('open')) {
                nb.classList.add('open');
                na.classList.add('open');
            }
            showToast('已加载文章，可编辑', 'info');

        function savePost() {
            var id = document.getElementById('editId').value;
            var title = document.getElementById('editTitle').value.trim();
            var category = document.getElementById('editCategory').value;
            var tagsRaw = document.getElementById('editTags').value.trim();
            var content = document.getElementById('editContent').value.trim();
            var date = document.getElementById('editDate').value || getToday();
            var views = parseInt(document.getElementById('editViews').value) || 0;
            var likes = parseInt(document.getElementById('editLikes').value) || 0;
            var author = document.getElementById('editAuthor').value.trim() || siteSettings.authorName || '墨轩主';
            if (!title || !content) { showToast('标题和正文不能为空', 'error'); return; }
            var tags = tagsRaw ? tagsRaw.split(',').map(function(t) { return t.trim(); }).filter(function(t) { return t; }) :
            [];
            if (id) {
                var post = posts.find(function(p) { return p.id === parseInt(id); });
                if (post) {
                    post.title = title;
                    post.category = category;
                    post.tags = tags;
                    post.content = content;

        function insertMarkdown(type) {
            var textarea = document.getElementById('editContent');
            var start = textarea.selectionStart;
            var end = textarea.selectionEnd;
            var text = textarea.value;
            var before = text.substring(0, start);
            var selected = text.substring(start, end);
            var after = text.substring(end);
            var insert = '';
            if (type === 'image') {
                var url = prompt(
                    '请输入图片路径 / URL：\n\n💡 支持网络图片 URL（如 "https://example.com/image.jpg"）\n或本地图片路径（如 "images/photo.jpg"）'
                    );
                if (url) insert = '![](' + url.trim() + ')';
            } else if (type === 'link') {
                var url = prompt('请输入链接 URL:');
                var txt = prompt('请输入链接文字:');
                if (url && txt) insert = '[' + txt + '](' + url + ')';
            } else if (type === 'video') {
                var url = prompt(
                    '请输入视频 URL：\n\n支持 mp4 直接链接（如 "https://example.com/video.mp4"）\n或 YouTube/B站嵌入链接（如 "https://www.youtube.com/embed/xxx"）'
                    );
                if (url) {
                    url = url.trim();
                    if (url.includes('youtube.com/embed') || url.includes('bilibili.com')) {
                        insert = '<iframe src="' + url + '" frameborder="0" allowfullscreen></iframe>';
                    } else {
                        insert = '<video src="' + url + '" controls></video>';
                    }
                }
            } else if (type === 'flash') {
                var url = prompt('请输入 Flash 文件 URL（如 "https://example.com/animation.swf"）：');
                if (url) {
                    insert = '<embed src="' + url.trim() +
                        '" type="application/x-shockwave-flash" width="100%" height="400" />';
                }
            } else if (type === 'bold') {
                insert = '**' + (selected || '加粗文字') + '**';
            } else if (type === 'italic') {
                insert = '*' + (selected || '斜体文字') + '*';
            } else if (type === 'code') {
                insert = '`' + (selected || '代码') + '`';
            }
            if (insert) {
                textarea.value = before + insert + after;
                var newPos = start + insert.length;
                textarea.selectionStart = textarea.selectionEnd = newPos;
                textarea.focus();
                textarea.style.height = 'auto';
                textarea.style.height = textarea.scrollHeight + 'px';
            }
        }

        function downloadSingleFile(type) {
            var ts = getTimestamp();
            var content, filename;
            if (type === 'posts') {
                content = generatePostsTxt(posts);
                filename = 'posts_' + ts + '.txt';
            } else if (type === 'config') {
                var data = {
                    categories: categories,
                    tags: tags,
                    about: aboutContent,
                    siteSettings: siteSettings,
                    fonts: fonts,
                    defaultFont: defaultFont,
                    fontSwitchEnabled: fontSwitchEnabled,
                    musicList: musicList,
                    musicEnabled: musicEnabled,
                    musicAutoPlay: musicAutoPlay,
                    musicDefault: musicDefault,
                    lastBackupTime: lastBackupTime,
                    autoLoadComments: autoLoadComments,
                    giscus: giscusConfig,
                    security: JSON.parse(localStorage.getItem('security_config') || '{}')
                };
                content = JSON.stringify(data, null, 2);
                filename = 'config_' + ts + '.json';
            } else if (type === 'messages') {
                var msgData = { messages: messages };
                content = JSON.stringify(msgData, null, 2);
                filename = 'messages_' + ts + '.json';
            }
            var blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('已下载: ' + filename, 'success');
        }

        function downloadBackup() {
            var includePosts = document.getElementById('backupPosts') && document.getElementById('backupPosts').checked;
            var includeConfig = document.getElementById('backupConfig') && document.getElementById('backupConfig').checked;
            var includeMessages = document.getElementById('backupMessages') && document.getElementById('backupMessages')
                .checked;
            if (!includePosts && !includeConfig && !includeMessages) {
                showToast('请至少选择一个文件备份', 'error');
                return;
            }
            var ts = getTimestamp();
            var zip = new JSZip();
            if (includePosts) {
                zip.file('posts_' + ts + '.txt', generatePostsTxt(posts));
            }
            if (includeConfig) {
                var configData = {
                    categories: categories,
                    tags: tags,
                    about: aboutContent,
                    siteSettings: siteSettings,
                    fonts: fonts,
                    defaultFont: defaultFont,
                    fontSwitchEnabled: fontSwitchEnabled,
                    musicList: musicList,
                    musicEnabled: musicEnabled,
                    musicAutoPlay: musicAutoPlay,
                    musicDefault: musicDefault,
                    lastBackupTime: lastBackupTime,
                    autoLoadComments: autoLoadComments,
                    giscus: giscusConfig,
                    security: JSON.parse(localStorage.getItem('security_config') || '{}')
                };
                zip.file('config_' + ts + '.json', JSON.stringify(configData, null, 2));
            }
            if (includeMessages) {
                var msgData = { messages: messages };
                zip.file('messages_' + ts + '.json', JSON.stringify(msgData, null, 2));
            }
            zip.generateAsync({ type: 'blob' }).then(function(blob) {
                var url = URL.createObjectURL(blob);
                var a = document.createElement('a');
                a.href = url;
                a.download = 'backup_' + ts + '.zip';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showToast('已下载备份压缩包', 'success');
            });
        }

            var includeMessages = document.getElementById('backupMessages') && document.getElementById('backupMessages')
                .checked;
            if (!includePosts && !includeConfig && !includeMessages) {
                showToast('请至少选择一个文件备份', 'error');
                return;
            }
            if (!confirm('确定要将选中的文件同步到仓库吗？同步前会自动备份当前版本到 backups/ 目录。')) return;

            var ts = getTimestamp();
            var promises = [];
            if (includePosts) {
                promises.push(saveFile('backups/posts_' + ts + '.txt', generatePostsTxt(posts), '备份 posts.txt'));
            }
            if (includeConfig) {
                var configData = {
                    categories: categories,
                    tags: tags,
                    about: aboutContent,
                    siteSettings: siteSettings,
                    fonts: fonts,
                    defaultFont: defaultFont,
                    fontSwitchEnabled: fontSwitchEnabled,
                    musicList: musicList,
                    musicEnabled: musicEnabled,
                    musicAutoPlay: musicAutoPlay,
                    musicDefault: musicDefault,
                    lastBackupTime: lastBackupTime,
                    autoLoadComments: autoLoadComments,
                    giscus: giscusConfig,
                    security: JSON.parse(localStorage.getItem('security_config') || '{}')
                };
                promises.push(saveFile('backups/config_' + ts + '.json', JSON.stringify(configData, null, 2),
                    '备份 config.json'));
            }
            if (includeMessages) {
                var msgData = { messages: messages };
                promises.push(saveFile('backups/messages_' + ts + '.json', JSON.stringify(msgData, null, 2),
                    '备份 messages.json'));
            }
            Promise.all(promises).then(function() {
                var updatePromises = [];
                if (includePosts) {
                    updatePromises.push(saveFile('posts.txt', generatePostsTxt(posts), '同步文章'));
                }
                if (includeConfig) {
                    var configData2 = {
                        categories: categories,
                        tags: tags,
                        about: aboutContent,
                        siteSettings: siteSettings,
                        fonts: fonts,
                        defaultFont: defaultFont,
                        fontSwitchEnabled: fontSwitchEnabled,
                        musicList: musicList,
                        musicEnabled: musicEnabled,
                        musicAutoPlay: musicAutoPlay,
                        musicDefault: musicDefault,
                        lastBackupTime: ts,
                        autoLoadComments: autoLoadComments,
                        giscus: giscusConfig,
                        security: JSON.parse(localStorage.getItem('security_config') || '{}')
                    };
                    updatePromises.push(saveFile('config.json', JSON.stringify(configData2, null, 2), '同步配置'));
                }
                if (includeMessages) {
                    var msgData2 = { messages: messages };
                    updatePromises.push(saveFile('messages.json', JSON.stringify(msgData2, null, 2), '同步留言'));
                }
                return Promise.all(updatePromises);
            }).then(function() {
                lastBackupTime = ts;
                var lastBackupEl = document.getElementById('lastBackupTime');
                if (lastBackupEl) lastBackupEl.textContent = ts;
                showToast('✅ 同步成功！备份已保存至 backups/ 目录。', 'success');
            }).catch(function(err) {
                showToast('同步失败: ' + err.message, 'error');
            });
        }

        function uploadBackupFile(event) {
            var file = event.target.files[0];
            if (!file) return;
            var reader = new FileReader();
            reader.onload = function(e) {
                var content = e.target.result;
                var filename = file.name;
                var isPosts = filename.includes('posts') || filename.endsWith('.txt');
                var isConfig = filename.includes('config') || filename.endsWith('.json');
                var isMessages = filename.includes('messages') || filename.endsWith('.json');
                if (!isPosts && !isConfig && !isMessages) {
                    showToast('无法识别文件类型，请上传 posts.txt、config.json 或 messages.json', 'error');
                    return;
                }
                var targetPath = isPosts ? 'posts.txt' : isConfig ? 'config.json' : 'messages.json';
                var confirmMsg = '确定要上传 "' + filename + '" 并覆盖 ' + targetPath + ' 吗？';
                if (!confirm(confirmMsg)) return;
                saveFile(targetPath, content, '上传 ' + filename).then(function() {
                    showToast('文件上传成功', 'success');
                    loadAllData();
                }).catch(function(err) {
                    showToast('上传失败: ' + err.message, 'error');
                });
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        function saveCommentSettings() {
            var autoLoadEl = document.getElementById('autoLoadComments');
            var repoEl = document.getElementById('giscusRepo');
            var repoIdEl = document.getElementById('giscusRepoId');
            var categoryEl = document.getElementById('giscusCategory');
            var categoryIdEl = document.getElementById('giscusCategoryId');
            if (autoLoadEl) autoLoadComments = autoLoadEl.checked;
            if (repoEl) giscusConfig.repo = repoEl.value.trim();
            if (repoIdEl) giscusConfig.repoId = repoIdEl.value.trim();
            if (categoryEl) giscusConfig.category = categoryEl.value.trim() || 'General';
            if (categoryIdEl) giscusConfig.categoryId = categoryIdEl.value.trim();
            saveConfigData().then(function() {
                showToast('评论设置已保存', 'success');
            });
        }

        function renderMessageAdminList() {
            var container = document.getElementById('messageAdminList');
            if (!container) return;
            var html = '';
            var sorted = messages.slice().reverse();
            sorted.forEach(function(m) {
                var statusText = m.status === 'approved' ? '✅ 已审核' : m.status === 'pending' ? '⏳ 待审核' :
                    '❌ 已驳回';
                var statusClass = m.status === 'approved' ? 'approved' : m.status === 'pending' ? 'pending' :
                    'rejected';
                html += '<div class="item">';
                html += '<div><strong>' + escapeHtml(m.nickname) + '</strong> <span style="font-size:12px;color:#8a7a6a;">' +
                    escapeHtml(m.email || '') + '</span><br/>';
                html += '<span style="font-size:13px;">' + escapeHtml(m.content) + '</span><br/>';
                html += '<span style="font-size:12px;color:#8a7a6a;">' + escapeHtml(m.time) + '</span> ';
                html += '<span class="status-badge ' + statusClass + '">' + statusText + '</span>';
                if (m.featured) html += ' <span class="status-badge" style="background:#c23531;color:#fff;">⭐ 精选</span>';
                html += '</div>';
                html += '<div class="actions">';
                if (m.status !== 'approved') {
                    html += '<button class="approve" onclick="approveMessage(' + m.id +
                    ')">审核通过</button>';
                }
                html += '<button class="edit" onclick="editMessage(' + m.id +
                ')">编辑</button>';
                html += '<button class="del" onclick="deleteMessage(' + m.id +
                ')">删除</button>';
                html += '<button class="featured" onclick="toggleFeatured(' + m.id +
                ')">' + (m.featured ? '取消精选' : '设为精选') + '</button>';
                html += '</div></div>';
            });
            container.innerHTML = html || '<p style="color:#8a7a6a;">暂无留言</p>';
        }

        function approveMessage(id) {
            var msg = messages.find(function(m) { return m.id === id; });
            if (!msg) return;
            msg.status = 'approved';
            saveMessagesData().then(function() {
                renderMessageAdminList();
                showToast('留言已审核通过', 'success');
                if (currentPage === 'interact') {
                    renderInteract(document.getElementById('mainContent'));
                }
            });
        }

        function deleteMessage(id) {
            if (!confirm('确定删除此留言？')) return;
            messages = messages.filter(function(m) { return m.id !== id; });
            saveMessagesData().then(function() {
                renderMessageAdminList();
                showToast('留言已删除', 'success');
                if (currentPage === 'interact') {
                    renderInteract(document.getElementById('mainContent'));
                }
            });
        }

        function toggleFeatured(id) {
            var msg = messages.find(function(m) { return m.id === id; });
            if (!msg) return;
            msg.featured = !msg.featured;
            saveMessagesData().then(function() {
                renderMessageAdminList();
                showToast(msg.featured ? '已设为精选' : '已取消精选', 'success');
                if (currentPage === 'interact') {
                    renderInteract(document.getElementById('mainContent'));
                }
            });
        }

        function editMessage(id) {
            var msg = messages.find(function(m) { return m.id === id; });
            if (!msg) return;
            var newContent = prompt('编辑留言内容:', msg.content);
            if (newContent !== null && newContent.trim()) {
                msg.content = newContent.trim();
                saveMessagesData().then(function() {
                    renderMessageAdminList();
                    showToast('留言已编辑', 'success');
                    if (currentPage === 'interact') {
                        renderInteract(document.getElementById('mainContent'));
                    }
                });
            }
        }

        function adminAddMessage() {
            var nickname = document.getElementById('adminMsgNickname').value.trim();
            var email = document.getElementById('adminMsgEmail').value.trim();
            var content = document.getElementById('adminMsgContent').value.trim();
            if (!nickname || !content) {
                showToast('昵称和留言内容不能为空', 'error');
                return;
            }
            var msg = {
                id: Date.now(),
                nickname: nickname,
                email: email,
                content: content,
                time: getNowString(),
                status: 'approved',
                featured: false,
                likes: 0
            };
            messages.push(msg);
            saveMessagesData().then(function() {
                document.getElementById('adminMsgNickname').value = '';
                document.getElementById('adminMsgEmail').value = '';
                document.getElementById('adminMsgContent').value = '';
                renderMessageAdminList();
                showToast('留言已添加', 'success');
                if (currentPage === 'interact') {
                    renderInteract(document.getElementById('mainContent'));
                }
            });
        }

        // ============================================================
        //  折叠面板
        // ============================================================
        function togglePanel(header) {
            var body = header.nextElementSibling;
            var arrow = header.querySelector('.arrow');
            if (!body) return;
            if (body.classList.contains('open')) {
                body.classList.remove('open');
                if (arrow) arrow.classList.remove('open');
            } else {
                body.classList.add('open');
                if (arrow) arrow.classList.add('open');
            }
        }

        // ============================================================
        //  模态框
        // ============================================================
        function openModal(html) {
            document.getElementById('modalBody').innerHTML = html;
            document.getElementById('modalOverlay').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }
        document.getElementById('modalClose').addEventListener('click', closeModal);
        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // ============================================================
        //  混合解密
        // ============================================================
        function base64ToArrayBuffer(base64) {
            var binary = atob(base64);
            var bytes = new Uint8Array(binary.length);
            for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
            return bytes.buffer;
        }

        function pemToArrayBuffer(pem, type) {
            var marker = '-----BEGIN ' + type + '-----';
            var footer = '-----END ' + type + '-----';
            var content = pem.trim();
            if (content.includes(marker)) {
                content = content.substring(content.indexOf(marker) + marker.length, content.lastIndexOf(footer));
            }
            return base64ToArrayBuffer(content.replace(/\s/g, ''));
        }

        function importPrivateKey(pem) {
            var buf = pemToArrayBuffer(pem, 'PRIVATE KEY');
            return crypto.subtle.importKey('pkcs8', buf, { name: 'RSA-OAEP', hash: 'SHA-256' }, false, ['decrypt']);
        }

        function hybridDecrypt(base64Package, privateKeyPem) {
            var combinedBuf = base64ToArrayBuffer(base64Package);
            var combined = new Uint8Array(combinedBuf);
            var iv = combined.slice(0, 12);
            var encryptedAESKeyLen = 256;
            if (combined.length < 12 + encryptedAESKeyLen) throw new Error('数据包长度异常');
            var encryptedAESKey = combined.slice(12, 12 + encryptedAESKeyLen);
            var ciphertextWithTag = combined.slice(12 + encryptedAESKeyLen);
            return importPrivateKey(privateKeyPem).then(function(rsaPrivKey) {
                return crypto.subtle.decrypt({ name: 'RSA-OAEP' }, rsaPrivKey, encryptedAESKey)
                    .then(function(aesKeyRaw) {
                        return crypto.subtle.importKey('raw', aesKeyRaw, { name: 'AES-GCM' }, false, ['decrypt']);
                    })
                    .then(function(aesKey) {
                        return crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv, tagLength: 128 }, aesKey,
                            ciphertextWithTag);
                    })
                    .then(function(plaintextBuf) {
                        return new TextDecoder().decode(plaintextBuf);
                    });
            });
        }

        // ============================================================
        //  初始化
        // ============================================================
        console.log('🚀 启动初始化...');
        loadAllData().then(function() {
            console.log('✅ 初始化完成');
        }).catch(function(err) {
            console.error('❌ 初始化失败:', err);
            try {
                applyConfig(DEFAULT_CONFIG);
                applySiteSettings();
                applyFontSettings();
                applyMusicSettings();
                renderPage('home');
                renderSidebarCategories();
            } catch (e) {
                console.error('❌ 紧急渲染失败:', e);
            }
        });

        window.addEventListener('hashchange', function() {
            var hash = window.location.hash;
            if (hash.startsWith('#post-')) {
                var id = parseInt(hash.replace('#post-', ''));
                if (!isNaN(id)) {
                    currentPage = 'post';
                    currentPostId = id;
                    renderPage('post', id);
                }
            } else if (hash.startsWith('#interact')) {
                currentPage = 'interact';
                renderPage('interact');
            } else {
                currentPage = 'home';
                renderPage('home');
            }
        });

        console.log('🏮 墨韵轩 · 古宅红木博客（稳定修复版）已加载');
        console.log('📝 文章数:', posts.length);
        console.log('💬 留言数:', messages.length);
        console.log('🔐 登录状态:', sessionStorage.getItem('blog_admin_logged') === 'true' ? '已登录' : '未登录');
        console.log('⚙️ GitHub配置:', isConfigured() ? '已配置' : '未配置');

        var mainContent = document.getElementById('mainContent');
        if (mainContent && mainContent.innerHTML.trim() === '') {
            console.warn('⚠️ 页面内容为空，强制重新渲染...');
            renderPage('home');
        }
    </script>
