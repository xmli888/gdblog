<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>墨韵轩 · 后台管理</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background-color: #f6efe8;
            font-family: '华文楷体','KaiTi','SimSun','宋体', serif;
            color: #3e2723;
            min-height: 100vh;
            padding: 20px;
        }
        a { text-decoration: none; color: inherit; }
        .container { max-width: 1000px; margin:0 auto; }
        .card {
            background: #fdf8f0;
            border: 1px solid #e8d5c0;
            border-radius: 12px;
            padding: 24px 28px;
            box-shadow: 0 2px 12px rgba(60,40,30,0.06);
            margin-bottom: 20px;
        }
        .card-title {
            font-size:20px; font-weight:normal; letter-spacing:4px;
            color:#4d281b;
            border-bottom:2px solid #e8d5c0;
            padding-bottom:10px; margin-bottom:16px;
            font-family: '华文楷体','KaiTi',serif;
        }
        .login-box {
            max-width:420px;
            margin:60px auto;
            padding:30px 28px 40px;
            background:#fdf8f0;
            border:1px solid #e8d5c0;
            border-radius:12px;
            box-shadow:0 4px 20px rgba(0,0,0,0.06);
            text-align:center;
        }
        .login-box h2 { font-weight:normal; letter-spacing:6px; font-family:'华文楷体','KaiTi',serif; color:#4d281b; margin-bottom:8px; }
        .login-box .login-sub { color:#8a7a6a; font-size:14px; margin-bottom:24px; }
        .login-box .form-group { margin-bottom:24px; text-align:left; }
        .login-box .form-group label { display:block; font-size:14px; color:#4d281b; font-weight:bold; margin-bottom:6px; text-align:center; }
        .login-box .form-group textarea { width:100%; padding:12px 14px; border:1px solid #ddd0c0; border-radius:6px; background:#fefcf8; font-size:14px; font-family:'Courier New',monospace; resize:vertical; min-height:100px; outline:none; text-align:left; margin:0 auto; }
        .login-box .form-group textarea:focus { border-color:#c23531; }
        .login-box .btn { width:100%; padding:14px; background:#c23531; color:#f5e6d3; border:none; border-radius:6px; font-size:16px; font-family:'华文楷体','KaiTi',serif; letter-spacing:4px; cursor:pointer; transition:0.2s; margin-top:8px; }
        .login-box .btn:hover { background:#a02a26; }
        .login-box .error-msg { color:#c23531; text-align:center; margin-top:16px; padding:10px; border-radius:4px; background:#fdf0f0; display:none; font-size:14px; }
        .login-box .error-msg.show { display:block; }
        .login-box .success-msg { color:#2a7a4a; text-align:center; margin-top:16px; padding:10px; border-radius:4px; background:#e8f5e9; display:none; font-size:14px; }
        .login-box .success-msg.show { display:block; }
        .login-box .info-msg { color:#666; text-align:center; margin-top:16px; padding:10px; border-radius:4px; background:#f5f5f5; display:none; font-size:14px; }
        .login-box .info-msg.show { display:block; }
        .panel { border:1px solid #e8d5c0; border-radius:8px; margin-bottom:12px; background:#fdf8f0; }
        .panel-header { padding:12px 18px; background:#efe4d8; cursor:pointer; display:flex; justify-content:space-between; align-items:center; font-family:'华文楷体','KaiTi',serif; font-size:16px; letter-spacing:2px; border-radius:8px 8px 0 0; user-select:none; }
        .panel-header:hover { background:#e8d5c0; }
        .panel-header .arrow { transition:transform 0.3s; }
        .panel-header .arrow.open { transform:rotate(180deg); }
        .panel-body { padding:16px 18px; display:none; border-top:1px solid #e8d5c0; }
        .panel-body.open { display:block; }
        .admin-form .form-group { margin-bottom:14px; }
        .admin-form .form-group label { display:block; font-size:14px; color:#4d281b; font-weight:bold; margin-bottom:4px; }
        .admin-form .form-group input,
        .admin-form .form-group textarea,
        .admin-form .form-group select { width:100%; padding:8px 12px; border:1px solid #ddd0c0; border-radius:6px; background:#fefcf8; font-size:14px; font-family:'SimSun','宋体',serif; outline:none; transition:border 0.2s; min-height:38px; box-sizing:border-box; }
        .admin-form .form-group input:focus,
        .admin-form .form-group textarea:focus,
        .admin-form .form-group select:focus { border-color:#c23531; }
        .admin-form .form-group textarea { min-height:80px; resize:vertical; }
        .admin-form .form-group textarea.auto-grow { min-height:120px; overflow:hidden; resize:none; }
        .admin-form .btn-group { display:flex; flex-wrap:wrap; gap:10px; margin-top:8px; }
        .admin-form .btn-group .btn { flex:0 1 auto; }
        .admin-form .btn { padding:6px 18px; border:none; border-radius:6px; background:#7a4a34; color:#f5e6d3; font-family:'华文楷体','KaiTi',serif; font-size:14px; letter-spacing:2px; cursor:pointer; transition:0.2s; }
        .admin-form .btn:hover { background:#5a3222; }
        .admin-form .btn-primary { background:#c23531; }
        .admin-form .btn-primary:hover { background:#a02a26; }
        .admin-form .btn-danger { background:#8b2500; }
        .admin-form .btn-danger:hover { background:#6b1a00; }
        .admin-form .btn-secondary { background:#6b7b8b; }
        .admin-form .btn-secondary:hover { background:#5a6a7a; }
        .admin-form .btn-success { background:#2a7a4a; }
        .admin-form .btn-success:hover { background:#1a5a3a; }
        .admin-list .item { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px dashed #e8d5c0; flex-wrap:wrap; gap:8px; }
        .admin-list .item .actions button { margin-left:6px; padding:2px 12px; border:1px solid #ddd0c0; border-radius:4px; background:transparent; cursor:pointer; font-size:12px; }
        .admin-list .item .actions .edit:hover { background:#7a4a34; color:#fff; }
        .admin-list .item .actions .del:hover { background:#8b2500; color:#fff; }
        .admin-list .item .actions .approve:hover { background:#2a7a4a; color:#fff; }
        .admin-list .item .actions .featured:hover { background:#c23531; color:#fff; }
        .admin-list .item .status-badge { font-size:11px; padding:2px 10px; border-radius:12px; background:#e8d5c0; color:#6b5a4a; }
        .admin-list .item .status-badge.approved { background:#2a7a4a; color:#fff; }
        .admin-list .item .status-badge.pending { background:#f59e0b; color:#fff; }
        .admin-list .item .status-badge.rejected { background:#8b2500; color:#fff; }
        .help-text { font-size:13px; color:#6b5a4a; background:#f5efe8; padding:8px 12px; border-radius:6px; border-left:3px solid #c23531; margin-bottom:10px; line-height:1.6; font-family:'SimSun','宋体',serif; }
        .help-text code { background:#e8ddd0; padding:1px 6px; border-radius:3px; font-size:12px; color:#3e2723; font-family:'Courier New',monospace; }
        .toast-msg { position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:#3e2723; color:#f5e6d3; padding:12px 28px; border-radius:8px; font-size:15px; z-index:9999; box-shadow:0 4px 20px rgba(0,0,0,0.3); opacity:0; transition:opacity 0.3s; pointer-events:none; max-width:90%; text-align:center; font-family:'华文楷体','KaiTi',serif; letter-spacing:1px; }
        .toast-msg.show { opacity:1; }
        .footer-admin { display:inline-flex; align-items:center; gap:4px; color:#8a7a6a; cursor:pointer; transition:0.2s; font-size:13px; font-family:'SimSun','宋体',serif; padding:6px 12px; border-radius:4px; -webkit-touch-callout:none; }
        .footer-admin:hover { color:#c23531; background:rgba(194,53,49,0.05); }
        .footer-admin:active { transform:scale(0.95); }
        .font-item { display:flex; justify-content:space-between; align-items:center; padding:8px 12px; border-bottom:1px dashed #e8d5c0; flex-wrap:wrap; gap:8px; border-radius:4px; }
        .font-item:hover { background:#f8f0e8; }
        .font-item .font-name { font-size:15px; font-weight:normal; font-family:'华文楷体','KaiTi',serif; }
        .font-item .font-path { font-size:12px; color:#8a7a6a; font-family:'SimSun','宋体',serif; margin-left:12px; }
        .font-item .font-source { font-size:11px; padding:2px 10px; border-radius:12px; background:#efe4d8; color:#6b5a4a; margin-left:8px; }
        .font-item .font-source.system { background:#d4c5b0; color:#4d281b; }
        .font-item .font-source.custom { background:#c23531; color:#fff; }
        .font-item .font-default-badge { font-size:11px; padding:2px 12px; border-radius:12px; background:#c23531; color:#fff; margin-left:8px; }
        .font-item .actions { display:flex; gap:4px; flex-wrap:wrap; }
        .font-item .actions button { margin-left:4px; padding:2px 12px; border:1px solid #ddd0c0; border-radius:4px; background:transparent; cursor:pointer; font-size:12px; transition:0.2s; }
        .font-item .actions .set-default { background:#2a7a4a; color:#fff; border-color:#2a7a4a; }
        .font-item .actions .set-default:hover { background:#1a5a3a; }
        .font-item .actions .unset-default { background:#8a7a6a; color:#fff; border-color:#8a7a6a; }
        .font-item .actions .unset-default:hover { background:#6a5a4a; }
        .font-item .actions .del-system { background:#8b2500; color:#fff; border-color:#8b2500; }
        .font-item .actions .del-system:hover { background:#6b1a00; }
        .font-item .actions .del-custom { background:#c23531; color:#fff; border-color:#c23531; }
        .font-item .actions .del-custom:hover { background:#a02a26; }
        .font-controls { display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-bottom:12px; }
        .font-controls .default-selector { flex:1; min-width:150px; }
        .font-controls .default-selector select { width:100%; padding:6px 10px; border:1px solid #ddd0c0; border-radius:4px; background:#fefcf8; font-size:14px; min-height:38px; }
        @media (max-width:600px) { .card { padding:16px; } .admin-form .btn-group .btn { flex:1 1 100%; } .font-item { flex-direction:column; align-items:flex-start; } .font-item .actions { width:100%; justify-content:flex-start; } }
    </style>
</head>
<body>
    <div id="toastContainer" class="toast-msg"></div>
    <div class="container" id="app"></div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="common.js"></script>

    <script>
        var currentPage = 'admin';

        // ============================================================
        //  登录界面
        // ============================================================
        function showLogin() {
            var html = '<div class="login-box"><h2>🔐 后台登录</h2><div class="login-sub">— 使用私钥验证身份 —</div><div class="form-group"><label>🔑 私钥 (PEM 格式)</label><textarea id="loginPrivateKey" rows="4" placeholder="-----BEGIN PRIVATE KEY----- ... -----END PRIVATE KEY-----"></textarea></div><button class="btn" onclick="doLogin()">登录</button><div id="loginError" class="error-msg"></div><div id="loginSuccess" class="success-msg"></div><div id="loginInfo" class="info-msg"></div><div style="margin-top:20px;font-size:13px;color:#8a7a6a;"><a href="index.html" style="color:#c23531;text-decoration:underline;">← 返回首页</a></div></div>';
            document.getElementById('app').innerHTML = html;
        }

        function doLogin() {
            var privKey = document.getElementById('loginPrivateKey').value.trim();
            var errorEl = document.getElementById('loginError');
            var successEl = document.getElementById('loginSuccess');
            var infoEl = document.getElementById('loginInfo');

            errorEl.className = 'error-msg';
            errorEl.style.display = 'none';
            successEl.className = 'success-msg';
            successEl.style.display = 'none';
            infoEl.className = 'info-msg';
            infoEl.style.display = 'none';

            if (!privKey) {
                errorEl.textContent = '❌ 请输入您的安全密钥';
                errorEl.className = 'error-msg show';
                errorEl.style.display = 'block';
                return;
            }

            if (!privKey.includes('-----BEGIN PRIVATE KEY-----') || !privKey.includes('-----END PRIVATE KEY-----')) {
                errorEl.textContent = '❌ 安全密钥格式不正确，请检查后重试';
                errorEl.className = 'error-msg show';
                errorEl.style.display = 'block';
                return;
            }

            infoEl.textContent = '⏳ 正在验证，请稍候...';
            infoEl.className = 'info-msg show';
            infoEl.style.display = 'block';

            var stored = localStorage.getItem('security_config');
            var security = stored ? JSON.parse(stored) : null;

            if (!security || !security.challengeCipher || !security.expectedPlain) {
                if (DEFAULT_CONFIG.security && DEFAULT_CONFIG.security.challengeCipher) {
                    security = DEFAULT_CONFIG.security;
                    localStorage.setItem('security_config', JSON.stringify(security));
                } else {
                    infoEl.style.display = 'none';
                    errorEl.textContent = '❌ 安全配置缺失，请检查 config.json';
                    errorEl.className = 'error-msg show';
                    errorEl.style.display = 'block';
                    return;
                }
            }

            hybridDecrypt(security.challengeCipher, privKey)
                .then(function(plain) {
                    if (plain === security.expectedPlain) {
                        infoEl.style.display = 'none';
                        successEl.textContent = '✅ 验证通过，正在加载...';
                        successEl.className = 'success-msg show';
                        successEl.style.display = 'block';
                        sessionStorage.setItem('blog_admin_logged', 'true');
                        setTimeout(function() { renderAdmin(); }, 500);
                    } else {
                        infoEl.style.display = 'none';
                        errorEl.textContent = '❌ 安全验证失败，请检查您输入的密钥是否正确。';
                        errorEl.className = 'error-msg show';
                        errorEl.style.display = 'block';
                    }
                })
                .catch(function(err) {
                    infoEl.style.display = 'none';
                    errorEl.textContent = '❌ 安全验证失败，请检查您输入的密钥是否正确。';
                    errorEl.className = 'error-msg show';
                    errorEl.style.display = 'block';
                });
        }

        function logout() {
            if (confirm('确定退出后台吗？')) {
                sessionStorage.removeItem('blog_admin_logged');
                showLogin();
                showToast('已退出', 'info');
            }
        }

        // ============================================================
        //  渲染管理面板（包含字体管理面板）
        // ============================================================
        function renderAdmin() {
            var container = document.getElementById('app');
            container.innerHTML = '<div class="card"><div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;"><div class="card-title" style="border-bottom:none; margin-bottom:0;">🔐 后台管理</div><div><span style="color:#8a7a6a;font-size:14px;margin-right:16px;">已登录</span><button class="footer-admin" onclick="logout()" style="border:1px solid #c23531;border-radius:6px;padding:6px 16px;background:transparent;color:#c23531;cursor:pointer;">退出</button><a href="index.html" style="margin-left:12px;color:#8a7a6a;text-decoration:underline;">← 返回首页</a></div></div></div>' +
                '<div class="panel"><div class="panel-header" onclick="togglePanel(this)">⚙️ 站点设置 <span class="arrow">▼</span></div><div class="panel-body"><div class="admin-form"><div class="form-group"><label>Logo 文字</label><input type="text" id="setLogo" /></div><div class="form-group"><label>博客标题</label><input type="text" id="setTitle" /></div><div class="form-group"><label>博客副标题</label><input type="text" id="setSub" /></div><div class="form-group"><label>作者名</label><input type="text" id="setAuthor" /></div><div class="form-group"><label>作者简介</label><textarea id="setAuthorDesc" rows="2"></textarea></div><div class="btn-group"><button class="btn btn-primary" onclick="saveSiteSettings()">保存</button></div></div></div></div>' +
                '<div class="panel" id="newPostPanel"><div class="panel-header" onclick="togglePanel(this)">✏️ 写新文章 <span class="arrow">▼</span></div><div class="panel-body"><div class="admin-form"><div class="form-group"><label>标题</label><input type="text" id="editTitle" /></div><div class="form-row" style="display:flex; gap:10px; flex-wrap:wrap;"><div class="form-group" style="flex:1;"><label>分类</label><select id="editCategory"></select><div style="display:flex; gap:6px; margin-top:4px;"><input type="text" id="newCategoryQuick" placeholder="新分类名称" style="flex:1;padding:8px 10px;border:1px solid #ddd0c0;border-radius:4px;font-size:13px;min-height:38px;" /><button class="btn btn-secondary" onclick="quickAddCategory()" style="padding:2px 12px;font-size:12px;min-height:38px;">+ 添加</button></div></div><div class="form-group" style="flex:1;"><label>标签 (逗号分隔)</label><input type="text" id="editTags" /></div></div><div class="form-row" style="display:flex; gap:10px; flex-wrap:wrap;"><div class="form-group" style="flex:1;"><label>作者</label><input type="text" id="editAuthor" /></div><div class="form-group" style="flex:1;"><label>日期</label><input type="date" id="editDate" /></div><div class="form-group" style="flex:0 0 100px;"><label>阅读数</label><input type="number" id="editViews" min="0" /></div><div class="form-group" style="flex:0 0 100px;"><label>点赞数</label><input type="number" id="editLikes" min="0" /></div></div><div class="form-group"><label>正文 (支持 Markdown)</label><div style="display:flex; gap:6px; margin-bottom:4px; flex-wrap:wrap;"><button class="btn btn-secondary" onclick="insertMarkdown(\'image\')">🖼️ 图片</button><button class="btn btn-secondary" onclick="insertMarkdown(\'link\')">🔗 链接</button><button class="btn btn-secondary" onclick="insertMarkdown(\'video\')">🎬 视频</button><button class="btn btn-secondary" onclick="insertMarkdown(\'flash\')">📦 Flash</button><button class="btn btn-secondary" onclick="insertMarkdown(\'bold\')">B</button><button class="btn btn-secondary" onclick="insertMarkdown(\'italic\')">I</button><button class="btn btn-secondary" onclick="insertMarkdown(\'code\')">&lt;/&gt;</button></div><textarea id="editContent" class="auto-grow" rows="4"></textarea></div><input type="hidden" id="editId" /><div class="btn-group"><button class="btn btn-primary" onclick="savePost()">保存文章</button><button class="btn btn-secondary" onclick="clearEditForm()">清空表单</button></div></div></div></div>' +
                '<div class="panel"><div class="panel-header" onclick="togglePanel(this)">📄 文章管理 <span class="arrow">▼</span></div><div class="panel-body"><div class="admin-list" id="adminPostList"></div></div></div>' +
                '<div class="panel"><div class="panel-header" onclick="togglePanel(this)">📂 分类管理 <span class="arrow">▼</span></div><div class="panel-body"><div class="admin-form"><div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center;"><input type="text" id="newCategoryName" placeholder="新分类名称" style="flex:1;min-height:38px;" /><button class="btn btn-primary" onclick="addCategory()" style="min-height:38px;">添加</button></div><div class="admin-list" id="categoryAdminList"></div></div></div></div>' +
                '<div class="panel"><div class="panel-header" onclick="togglePanel(this)">🏷️ 标签管理 <span class="arrow">▼</span></div><div class="panel-body"><div class="admin-form"><div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center;"><input type="text" id="newTagName" placeholder="新标签名称" style="flex:1;min-height:38px;" /><button class="btn btn-primary" onclick="addTag()" style="min-height:38px;">添加</button></div><div class="admin-list" id="tagAdminList"></div></div></div></div>' +
                // ★★★ 字体管理面板 ★★★
                '<div class="panel"><div class="panel-header" onclick="togglePanel(this)">🔤 字体管理 <span class="arrow">▼</span></div><div class="panel-body"><div class="admin-form"><div class="help-text">💡 系统字体（楷体、宋体等）由操作系统提供，无需上传文件。<br/>自定义字体需要上传字体文件（.ttf/.woff/.woff2）并填写正确的路径。</div>' +
                // 添加字体表单
                '<div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:12px;"><div style="flex:2; min-width:150px;"><label style="font-weight:bold; display:block; font-size:13px; margin-bottom:2px;">字体名称</label><input type="text" id="newFontName" placeholder="如：禹卫书法行书" style="width:100%;padding:8px 10px;border:1px solid #ddd0c0;border-radius:4px;font-size:14px;min-height:38px;" /></div><div style="flex:3; min-width:200px;"><label style="font-weight:bold; display:block; font-size:13px; margin-bottom:2px;">字体文件路径</label><input type="text" id="newFontPath" placeholder="如：myzt/禹卫书法行书.ttf" style="width:100%;padding:8px 10px;border:1px solid #ddd0c0;border-radius:4px;font-size:14px;min-height:38px;" /></div><div style="flex:0 0 auto; align-self:flex-end;"><button class="btn btn-primary" onclick="addFont()" style="min-height:38px;padding:0 24px;">添加</button></div></div>' +
                // 默认字体选择 + 重置按钮
                '<div class="font-controls"><div class="default-selector"><label style="font-weight:bold; font-size:13px;">默认字体</label><select id="defaultFontSelect" onchange="setDefaultFontFromSelect()"></select></div><div><button class="btn btn-secondary" onclick="resetDefaultFont()" style="min-height:38px;">重置默认</button><button class="btn btn-secondary" onclick="resetFontList()" style="min-height:38px;margin-left:8px;">恢复默认列表</button></div></div>' +
                // 字体列表
                '<div class="admin-list" id="fontAdminList"></div></div></div></div>' +

        function loadAdminData() {
            loadAllData().then(function() {
                populateCategorySelect();

                loadSiteSettingsForm();
                loadFontSettingsForm();
                loadMusicSettingsForm();

                renderMusicAdmin();

        function togglePanel(header) {
            var body = header.nextElementSibling;
            var arrow = header.querySelector('.arrow');
            if (!body) return;
            if (body.classList.contains('open')) { body.classList.remove('open'); if (arrow) arrow.classList.remove('open'); }
            else { body.classList.add('open'); if (arrow) arrow.classList.add('open'); }
        }

        //  分类管理
        // ============================================================
        function renderCategoryAdmin() {
            var container = document.getElementById('categoryAdminList');
            if (!container) return;
            var html = '';
            categories.forEach(function(c, idx) {
                html += '<div class="item"><span>' + escapeHtml(c) + '</span><div class="actions"><button class="del" onclick="deleteCategory(' + idx + ')">删除</button></div></div>';
            });
            container.innerHTML = html || '<p style="color:#8a7a6a;">暂无分类</p>';
        }

        function addCategory() {
            var name = document.getElementById('newCategoryName').value.trim();
            if (!name) { showToast('请输入分类名称', 'error'); return; }
            if (categories.indexOf(name) !== -1) { showToast('分类已存在', 'error'); return; }
            categories.push(name);
            saveConfigData().then(function() {
                renderCategoryAdmin();
                populateCategorySelect();
                showToast('分类已添加', 'success');
                document.getElementById('newCategoryName').value = '';
            });
        }

        function deleteCategory(index) {
            if (!confirm('确定删除分类？')) return;
            categories.splice(index, 1);
            saveConfigData().then(function() {
                renderCategoryAdmin();
                populateCategorySelect();
                showToast('分类已删除', 'success');
            });
        }

        function quickAddCategory() {
            var name = document.getElementById('newCategoryQuick').value.trim();
            if (!name) { showToast('请输入分类名称', 'error'); return; }
            if (categories.indexOf(name) !== -1) { showToast('分类已存在', 'error'); return; }
            categories.push(name);
            saveConfigData().then(function() {
                populateCategorySelect();
                document.getElementById('editCategory').value = name;
                document.getElementById('newCategoryQuick').value = '';
                renderCategoryAdmin();
                showToast('分类已添加', 'success');
            });

        function populateCategorySelect() {
            var sel = document.getElementById('editCategory');
            if (!sel) return;
            var cats = categories.length ? categories : ['随笔', '书评', '游记', '散文', '诗词', '其他'];
            var html = '';
            cats.forEach(function(c) { html += '<option value="' + escapeHtml(c) + '">' + escapeHtml(c) + '</option>'; });

        // ============================================================
        //  标签管理
        // ============================================================
        function populateTagAdminList() {
            var container = document.getElementById('tagAdminList');
            if (!container) return;
            var html = '';
            tags.forEach(function(t, idx) {
                html += '<div class="item"><span>' + escapeHtml(t) + '</span><div class="actions"><button class="edit" onclick="editTag(' + idx + ')">编辑</button><button class="del" onclick="deleteTag(' + idx + ')">删除</button></div></div>';
            });
            container.innerHTML = html || '<p style="color:#8a7a6a;">暂无标签</p>';
        }

        function addTag() {
            var name = document.getElementById('newTagName').value.trim();
            if (!name) { showToast('请输入标签名称', 'error'); return; }
            if (tags.indexOf(name) !== -1) { showToast('标签已存在', 'error'); return; }
            tags.push(name);
            saveConfigData().then(function() {
                populateTagAdminList();
                showToast('标签已添加', 'success');
                document.getElementById('newTagName').value = '';
            });
        }

        function deleteTag(index) {
            if (!confirm('确定删除标签？')) return;
            var tag = tags[index];
            tags.splice(index, 1);
            posts.forEach(function(p) {
                if (p.tags) {
                    p.tags = p.tags.filter(function(t) { return t !== tag; });
                }
            });
            var jsonData = JSON.stringify(posts, null, 2);
            if (isConfigured()) {
                saveFile('posts.json', jsonData, '删除标签').then(function() {
                    saveConfigData().then(function() {
                        populateTagAdminList();
                        renderAdminList();
                        showToast('标签已删除', 'success');
                    });
                });
            } else {
                showToast('请先配置GitHub', 'error');
                focusGitHubConfig();
            }
        }

        function editTag(index) {
            var oldName = tags[index];
            var newName = prompt('修改标签名:', oldName);
            if (newName && newName.trim() && newName.trim() !== oldName) {
                var newTrim = newName.trim();
                if (tags.indexOf(newTrim) !== -1) { showToast('标签已存在', 'error'); return; }
                tags[index] = newTrim;
                posts.forEach(function(p) {
                    if (p.tags) {
                        var idx = p.tags.indexOf(oldName);
                        if (idx !== -1) p.tags[idx] = newTrim;
                    }
                });
                var jsonData = JSON.stringify(posts, null, 2);
                if (isConfigured()) {
                    saveFile('posts.json', jsonData, '更新标签').then(function() {
                        saveConfigData().then(function() {
                            populateTagAdminList();
                            renderAdminList();
                            showToast('标签已更新', 'success');
                        });
                    });
                } else {
                    showToast('请先配置GitHub', 'error');
                    focusGitHubConfig();
                }
            }
        }

        function renderAdminList() {
            var container = document.getElementById('adminPostList');
            if (!container) return;
            var sorted = sortPosts(posts);
            var html = '';
            sorted.forEach(function(p) {
                html += '<div class="item"><span>' + escapeHtml(p.title) + ' <span style="color:#8a7a6a;font-size:12px;">(' + p.date + ')</span></span><div class="actions"><button class="edit" onclick="editPost(' + p.id + ')">编辑</button><button class="del" onclick="deletePost(' + p.id + ')">删除</button></div></div>';

        function editPost(id) {
            var post = posts.find(function(p) { return p.id === id; });
            if (!post) return;
            document.getElementById('editId').value = post.id;
            document.getElementById('editTitle').value = post.title;
            document.getElementById('editCategory').value = post.category;
            document.getElementById('editTags').value = post.tags ? post.tags.join(',') : '';
            document.getElementById('editContent').value = post.content;
            document.getElementById('editDate').value = post.date || getToday();
            document.getElementById('editViews').value = post.views || 0;
            document.getElementById('editLikes').value = post.likes || 0;
            document.getElementById('editAuthor').value = post.author || siteSettings.authorName || '';
            var np = document.getElementById('newPostPanel');
            var nb = np.querySelector('.panel-body');
            var na = np.querySelector('.arrow');
            if (!nb.classList.contains('open')) { nb.classList.add('open'); na.classList.add('open'); }
            showToast('已加载文章，可编辑', 'info');
        }

        function savePost() {
            var id = document.getElementById('editId').value;
            var title = document.getElementById('editTitle').value.trim();
            var category = document.getElementById('editCategory').value;
            var tagsRaw = document.getElementById('editTags').value.trim();
            var content = document.getElementById('editContent').value.trim();
            var date = document.getElementById('editDate').value || getToday();
            var views = parseInt(document.getElementById('editViews').value) || 0;
            var likes = parseInt(document.getElementById('editLikes').value) || 0;
            var author = document.getElementById('editAuthor').value.trim() || siteSettings.authorName || '墨轩主';
            if (!title || !content) { showToast('标题和正文不能为空', 'error'); return; }
            var tags = tagsRaw ? tagsRaw.split(',').map(function(t) { return t.trim(); }).filter(function(t) { return t; }) : [];
            if (id) {
                var post = posts.find(function(p) { return p.id === parseInt(id); });
                if (post) {
                    post.title = title;
                    post.category = category;
                    post.tags = tags;
                    post.content = content;
                    post.date = date;
                    post.views = views;
                    post.likes = likes;
                    post.author = author;
                }
            } else {
                var newId = posts.length ? Math.max.apply(null, posts.map(function(p) { return p.id; })) + 1 : 1;
                posts.push({ id: newId, title: title, category: category, tags: tags, content: content, date: date, views: views, likes: likes, author: author });
            }
            var jsonData = JSON.stringify(posts, null, 2);
            if (isConfigured()) {
                saveFile('posts.json', jsonData, '更新文章').then(function() {
                    showToast('保存成功', 'success');
                    clearEditForm();
                    renderAdminList();
                    tags.forEach(function(t) { if (tags.indexOf(t) === -1) tags.push(t); });
                    saveConfigData().catch(function() {});
                }).catch(function(err) { showToast('保存失败: ' + err.message, 'error'); });
            } else {
                showToast('请先配置GitHub', 'error');
                focusGitHubConfig();
            }
        }

        function deletePost(id) {
            if (!confirm('确定删除此文章？')) return;
            posts = posts.filter(function(p) { return p.id !== id; });
            var jsonData = JSON.stringify(posts, null, 2);
            if (isConfigured()) {
                saveFile('posts.json', jsonData, '删除文章').then(function() {
                    showToast('已删除', 'success');
                    renderAdminList();
                    populateCategorySelect();
                }).catch(function(err) { showToast('删除失败: ' + err.message, 'error'); });
            } else {
                showToast('请先配置GitHub', 'error');
                focusGitHubConfig();
            }
        }

            document.getElementById('editId').value = '';
            document.getElementById('editTitle').value = '';
            document.getElementById('editTags').value = '';
            document.getElementById('editContent').value = '';
            document.getElementById('editDate').value = getToday();
            document.getElementById('editViews').value = 0;
            document.getElementById('editLikes').value = 0;
            document.getElementById('editAuthor').value = siteSettings.authorName || '';
            showToast('表单已清空', 'info');
        }

        // ============================================================
        //  ★★★ 字体管理（核心）★★★
        // ============================================================
        function loadFontAdminList() {
            var container = document.getElementById('fontAdminList');
            if (!container) return;

            // 填充默认字体下拉框
            populateDefaultFontSelect();

            var html = '';
            fonts.forEach(function(f, idx) {
                var isDefault = (f.name === defaultFont);
                var isSystem = (f.source === 'system');
                var sourceLabel = isSystem ? '系统' : '自定义';
                var sourceClass = isSystem ? 'system' : 'custom';
                var pathDisplay = f.path ? ' <span class="font-path">' + escapeHtml(f.path) + '</span>' : '';

                html += '<div class="font-item">';
                html += '<div><span class="font-name">' + escapeHtml(f.name) + '</span>' + pathDisplay;
                html += '<span class="font-source ' + sourceClass + '">' + sourceLabel + '</span>';
                if (isDefault) {
                    html += '<span class="font-default-badge">✅ 当前默认</span>';
                }
                html += '</div>';
                html += '<div class="actions">';
                if (isDefault) {
                    html += '<button class="unset-default" onclick="unsetDefaultFont()">取消默认</button>';
                } else {
                    html += '<button class="set-default" onclick="setDefaultFont(\'' + escapeHtml(f.name) + '\')">设为默认</button>';
                }
                if (isSystem) {
                    html += '<button class="del-system" onclick="deleteFont(' + idx + ', true)">删除</button>';
                } else {
                    html += '<button class="del-custom" onclick="deleteFont(' + idx + ', false)">删除</button>';
                }
                html += '</div></div>';
            });
            container.innerHTML = html || '<p style="color:#8a7a6a;">暂无字体</p>';
        }

        function populateDefaultFontSelect() {
            var sel = document.getElementById('defaultFontSelect');
            if (!sel) return;
            var html = '';
            fonts.forEach(function(f) {
                var selected = (f.name === defaultFont) ? ' selected' : '';
                html += '<option value="' + escapeHtml(f.name) + '"' + selected + '>' + escapeHtml(f.name) + '</option>';
            });
            sel.innerHTML = html;
        }

        function setDefaultFontFromSelect() {
            var sel = document.getElementById('defaultFontSelect');
            if (!sel) return;
            var name = sel.value;
            if (name) {
                setDefaultFont(name);
            }
        }

        function setDefaultFont(name) {
            var exists = fonts.some(function(f) { return f.name === name; });
            if (!exists) { showToast('字体不存在', 'error'); return; }
            defaultFont = name;
            saveConfigData().then(function() {
                loadFontAdminList();
                showToast('默认字体已设为: ' + name, 'success');
            }).catch(function(err) { showToast('保存失败: ' + err.message, 'error'); });
        }

        function unsetDefaultFont() {
            if (fonts.length === 0) { showToast('没有字体可设置', 'error'); return; }
            defaultFont = fonts[0].name;
            saveConfigData().then(function() {
                loadFontAdminList();
                showToast('已取消默认，回退到: ' + defaultFont, 'info');
            }).catch(function(err) { showToast('保存失败: ' + err.message, 'error'); });
        }

        function resetDefaultFont() {
            defaultFont = '楷体';
            saveConfigData().then(function() {
                loadFontAdminList();
                showToast('默认字体已重置为: 楷体', 'success');
            }).catch(function(err) { showToast('保存失败: ' + err.message, 'error'); });
        }

        function resetFontList() {
            if (!confirm('确定恢复默认字体列表吗？将删除所有自定义字体，系统字体恢复为初始7个。')) return;
            fonts = SYSTEM_FONTS.slice();
            defaultFont = '楷体';
            saveConfigData().then(function() {
                loadFontAdminList();
                showToast('字体列表已恢复默认', 'success');
            }).catch(function(err) { showToast('保存失败: ' + err.message, 'error'); });
        }

        function addFont() {
            var name = document.getElementById('newFontName').value.trim();
            var path = document.getElementById('newFontPath').value.trim();
            if (!name) { showToast('请输入字体名称', 'error'); return; }
            // 检查是否已存在
            var exists = fonts.some(function(f) { return f.name === name; });
            if (exists) { showToast('字体 "' + name + '" 已存在', 'error'); return; }
            // 判断是否为系统字体（与系统字体名称冲突）
            var isSystem = SYSTEM_FONTS.some(function(sf) { return sf.name === name; });
            if (isSystem) {
                showToast('"' + name + '" 是系统字体，无需添加', 'error');
                return;
            }
            fonts.push({ name: name, source: 'custom', path: path || '' });
            // 如果没有默认字体，设为当前
            if (!defaultFont) { defaultFont = name; }
            saveConfigData().then(function() {
                document.getElementById('newFontName').value = '';
                document.getElementById('newFontPath').value = '';
                loadFontAdminList();
                showToast('字体已添加: ' + name, 'success');
            }).catch(function(err) { showToast('保存失败: ' + err.message, 'error'); });
        }

        function deleteFont(index, isSystem) {
            var font = fonts[index];
            if (!font) return;
            var msg = isSystem ?
                '确定删除系统字体 "' + font.name + '" 吗？删除后可通过"恢复默认列表"还原。' :
                '确定删除自定义字体 "' + font.name + '" 吗？';
            if (!confirm(msg)) return;
            fonts.splice(index, 1);
            if (defaultFont === font.name) {
                defaultFont = fonts.length > 0 ? fonts[0].name : '';
            }
            saveConfigData().then(function() {
                loadFontAdminList();
                showToast('已删除: ' + font.name, 'success');

        // ============================================================
        //  安全设置
        // ============================================================
        function loadSecuritySettings() {
            var stored = localStorage.getItem('security_config');
            var sec = stored ? JSON.parse(stored) : null;
            if (!sec) sec = DEFAULT_CONFIG.security || {};
            var pubEl = document.getElementById('secPublicKey');
            var cipherEl = document.getElementById('secChallengeCipher');
            var plainEl = document.getElementById('secExpectedPlain');
            if (pubEl) pubEl.value = sec.publicKey || '';
            if (cipherEl) cipherEl.value = sec.challengeCipher || '';
            if (plainEl) plainEl.value = sec.expectedPlain || '';
        }

        function saveSecuritySettings() {
            var pub = document.getElementById('secPublicKey').value.trim();
            var cipher = document.getElementById('secChallengeCipher').value.trim();
            var plain = document.getElementById('secExpectedPlain').value.trim();
            if (!pub || !cipher || !plain) { showToast('所有字段都必须填写', 'error'); return; }
            var sec = { publicKey: pub, challengeCipher: cipher, expectedPlain: plain };
            localStorage.setItem('security_config', JSON.stringify(sec));
            DEFAULT_CONFIG.security = sec;
            saveConfigData().then(function() { showToast('安全设置已保存', 'success'); });
        }

        function resetSecuritySettings() {
            if (!confirm('恢复默认安全设置？')) return;
            localStorage.removeItem('security_config');
            var pubEl = document.getElementById('secPublicKey');
            var cipherEl = document.getElementById('secChallengeCipher');
            var plainEl = document.getElementById('secExpectedPlain');
            if (pubEl) pubEl.value = DEFAULT_CONFIG.security.publicKey;
            if (cipherEl) cipherEl.value = DEFAULT_CONFIG.security.challengeCipher;
            if (plainEl) plainEl.value = DEFAULT_CONFIG.security.expectedPlain;
            showToast('已恢复默认', 'info');
        }

        function focusGitHubConfig() {

        // ============================================================
        //  备份功能
        // ============================================================
        function downloadSingleFile(type) {
            var ts = getTimestamp();
            var content, filename;
            if (type === 'posts') { content = JSON.stringify(posts, null, 2); filename = 'posts_' + ts + '.json'; }
            else if (type === 'config') {
                var data = { categories: categories, tags: tags, about: aboutContent, siteSettings: siteSettings, fonts: fonts, defaultFont: defaultFont, fontSwitchEnabled: fontSwitchEnabled, musicList: musicList, musicEnabled: musicEnabled, musicAutoPlay: musicAutoPlay, musicDefault: musicDefault, lastBackupTime: lastBackupTime, autoLoadComments: autoLoadComments, giscus: giscusConfig, security: JSON.parse(localStorage.getItem('security_config') || '{}') };
                content = JSON.stringify(data, null, 2); filename = 'config_' + ts + '.json';
            } else if (type === 'messages') { var msgData = { messages: messages }; content = JSON.stringify(msgData, null, 2); filename = 'messages_' + ts + '.json'; }
            var blob = new Blob([content], { type: 'application/json;charset=utf-8' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('已下载: ' + filename, 'success');
        }

        function toggleAllBackup() {
            var postsCheck = document.getElementById('backupPosts');
            var configCheck = document.getElementById('backupConfig');
            var messagesCheck = document.getElementById('backupMessages');
            if (!postsCheck || !configCheck || !messagesCheck) return;
            var allChecked = postsCheck.checked && configCheck.checked && messagesCheck.checked;
            var newState = !allChecked;
            postsCheck.checked = newState;
            configCheck.checked = newState;
            messagesCheck.checked = newState;
        }

        function downloadBackup() {
            var includePosts = document.getElementById('backupPosts') && document.getElementById('backupPosts').checked;
            var includeConfig = document.getElementById('backupConfig') && document.getElementById('backupConfig').checked;
            var includeMessages = document.getElementById('backupMessages') && document.getElementById('backupMessages').checked;
            if (!includePosts && !includeConfig && !includeMessages) { showToast('请至少选择一个文件备份', 'error'); return; }
            var ts = getTimestamp();
            var zip = new JSZip();
            if (includePosts) { zip.file('posts_' + ts + '.json', JSON.stringify(posts, null, 2)); }
            if (includeConfig) {
                var configData = { categories: categories, tags: tags, about: aboutContent, siteSettings: siteSettings, fonts: fonts, defaultFont: defaultFont, fontSwitchEnabled: fontSwitchEnabled, musicList: musicList, musicEnabled: musicEnabled, musicAutoPlay: musicAutoPlay, musicDefault: musicDefault, lastBackupTime: lastBackupTime, autoLoadComments: autoLoadComments, giscus: giscusConfig, security: JSON.parse(localStorage.getItem('security_config') || '{}') };
                zip.file('config_' + ts + '.json', JSON.stringify(configData, null, 2));
            }
            if (includeMessages) { var msgData = { messages: messages }; zip.file('messages_' + ts + '.json', JSON.stringify(msgData, null, 2)); }
            zip.generateAsync({ type: 'blob' }).then(function(blob) {
                var url = URL.createObjectURL(blob);
                var a = document.createElement('a');
                a.href = url;
                a.download = 'backup_' + ts + '.zip';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showToast('已下载备份压缩包', 'success');
            });
        }

        function syncBackupToRepo() {
            if (!isConfigured()) { showToast('请先配置GitHub', 'error'); focusGitHubConfig(); return; }
            var includePosts = document.getElementById('backupPosts') && document.getElementById('backupPosts').checked;
            var includeConfig = document.getElementById('backupConfig') && document.getElementById('backupConfig').checked;
            var includeMessages = document.getElementById('backupMessages') && document.getElementById('backupMessages').checked;
            if (!includePosts && !includeConfig && !includeMessages) { showToast('请至少选择一个文件备份', 'error'); return; }
            if (!confirm('确定要将选中的文件同步到仓库吗？同步前会自动备份当前版本到 backups/ 目录。')) return;
            var ts = getTimestamp();
            var promises = [];
            if (includePosts) { promises.push(saveFile('backups/posts_' + ts + '.json', JSON.stringify(posts, null, 2), '备份 posts.json')); }
            if (includeConfig) {
                var configData = { categories: categories, tags: tags, about: aboutContent, siteSettings: siteSettings, fonts: fonts, defaultFont: defaultFont, fontSwitchEnabled: fontSwitchEnabled, musicList: musicList, musicEnabled: musicEnabled, musicAutoPlay: musicAutoPlay, musicDefault: musicDefault, lastBackupTime: lastBackupTime, autoLoadComments: autoLoadComments, giscus: giscusConfig, security: JSON.parse(localStorage.getItem('security_config') || '{}') };
                promises.push(saveFile('backups/config_' + ts + '.json', JSON.stringify(configData, null, 2), '备份 config.json'));
            }
            if (includeMessages) { var msgData = { messages: messages }; promises.push(saveFile('backups/messages_' + ts + '.json', JSON.stringify(msgData, null, 2), '备份 messages.json')); }
            Promise.all(promises).then(function() {
                var updatePromises = [];
                if (includePosts) { updatePromises.push(saveFile('posts.json', JSON.stringify(posts, null, 2), '同步文章')); }
                if (includeConfig) {
                    var configData2 = { categories: categories, tags: tags, about: aboutContent, siteSettings: siteSettings, fonts: fonts, defaultFont: defaultFont, fontSwitchEnabled: fontSwitchEnabled, musicList: musicList, musicEnabled: musicEnabled, musicAutoPlay: musicAutoPlay, musicDefault: musicDefault, lastBackupTime: ts, autoLoadComments: autoLoadComments, giscus: giscusConfig, security: JSON.parse(localStorage.getItem('security_config') || '{}') };
                    updatePromises.push(saveFile('config.json', JSON.stringify(configData2, null, 2), '同步配置'));
                }
                if (includeMessages) { var msgData2 = { messages: messages }; updatePromises.push(saveFile('messages.json', JSON.stringify(msgData2, null, 2), '同步留言')); }
                return Promise.all(updatePromises);
            }).then(function() {
                lastBackupTime = ts;
                var lastBackupEl = document.getElementById('lastBackupTime');
                if (lastBackupEl) lastBackupEl.textContent = ts;
                showToast('✅ 同步成功！备份已保存至 backups/ 目录。', 'success');
            }).catch(function(err) { showToast('同步失败: ' + err.message, 'error'); });
        }

        function uploadBackupFile(event) {
            var file = event.target.files[0];
            if (!file) return;
            var reader = new FileReader();
            reader.onload = function(e) {
                var content = e.target.result;
                var filename = file.name;
                var isPosts = filename.includes('posts') && filename.endsWith('.json');
                var isConfig = filename.includes('config') && filename.endsWith('.json');
                var isMessages = filename.includes('messages') && filename.endsWith('.json');
                if (!isPosts && !isConfig && !isMessages) { showToast('请上传 posts.json、config.json 或 messages.json', 'error'); return; }
                var targetPath = isPosts ? 'posts.json' : isConfig ? 'config.json' : 'messages.json';
                var confirmMsg = '确定要上传 "' + filename + '" 并覆盖 ' + targetPath + ' 吗？';
                if (!confirm(confirmMsg)) return;
                saveFile(targetPath, content, '上传 ' + filename).then(function() {
                    showToast('文件上传成功', 'success');
                    loadAdminData();
                }).catch(function(err) { showToast('上传失败: ' + err.message, 'error'); });
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        // ============================================================
        //  ★★★ 留言管理功能（完整保留）★★★
        // ============================================================
        function renderMessageAdminList() {
            var container = document.getElementById('messageAdminList');
            if (!container) return;
            var html = '';
            var sorted = messages.slice().reverse();
            sorted.forEach(function(m) {
                var statusText = m.status === 'approved' ? '✅ 已审核' : m.status === 'pending' ? '⏳ 待审核' : '❌ 已驳回';
                var statusClass = m.status === 'approved' ? 'approved' : m.status === 'pending' ? 'pending' : 'rejected';
                html += '<div class="item"><div><strong>' + escapeHtml(m.nickname) + '</strong> <span style="font-size:12px;color:#8a7a6a;">' + escapeHtml(m.email || '') + '</span><br/><span style="font-size:13px;">' + escapeHtml(m.content) + '</span><br/><span style="font-size:12px;color:#8a7a6a;">' + escapeHtml(m.time) + '</span> <span class="status-badge ' + statusClass + '">' + statusText + '</span>' + (m.featured ? ' <span class="status-badge" style="background:#c23531;color:#fff;">⭐ 精选</span>' : '') + '</div><div class="actions">' + (m.status !== 'approved' ? '<button class="approve" onclick="approveMessage(' + m.id + ')">审核通过</button>' : '') + '<button class="edit" onclick="editMessage(' + m.id + ')">编辑</button><button class="del" onclick="deleteMessage(' + m.id + ')">删除</button><button class="featured" onclick="toggleFeatured(' + m.id + ')">' + (m.featured ? '取消精选' : '设为精选') + '</button></div></div>';
            });
            container.innerHTML = html || '<p style="color:#8a7a6a;">暂无留言</p>';
        }

        function approveMessage(id) {
            var msg = messages.find(function(m) { return m.id === id; });
            if (!msg) return;
            msg.status = 'approved';
            saveMessagesData().then(function() {
                renderMessageAdminList();
                showToast('留言已审核通过', 'success');
            });
        }

        function deleteMessage(id) {
            if (!confirm('确定删除此留言？')) return;
            messages = messages.filter(function(m) { return m.id !== id; });
            saveMessagesData().then(function() {
                renderMessageAdminList();
                showToast('留言已删除', 'success');
            });
        }

        function toggleFeatured(id) {
            var msg = messages.find(function(m) { return m.id === id; });
            if (!msg) return;
            msg.featured = !msg.featured;
            saveMessagesData().then(function() {
                renderMessageAdminList();
                showToast(msg.featured ? '已设为精选' : '已取消精选', 'success');
            });

        function editMessage(id) {
            var msg = messages.find(function(m) { return m.id === id; });
            if (!msg) return;
            var newContent = prompt('编辑留言内容:', msg.content);
            if (newContent !== null && newContent.trim()) {
                msg.content = newContent.trim();
                saveMessagesData().then(function() {
                    renderMessageAdminList();
                    showToast('留言已编辑', 'success');
                });
            }
        }

        function adminAddMessage() {
            var nickname = document.getElementById('adminMsgNickname').value.trim();
            var email = document.getElementById('adminMsgEmail').value.trim();
            var content = document.getElementById('adminMsgContent').value.trim();
            if (!nickname || !content) { showToast('昵称和留言内容不能为空', 'error'); return; }
            var msg = { id: Date.now(), nickname: nickname, email: email, content: content, time: getNowString(), status: 'approved', featured: false, likes: 0 };
            messages.push(msg);
            saveMessagesData().then(function() {
                document.getElementById('adminMsgNickname').value = '';
                document.getElementById('adminMsgEmail').value = '';
                document.getElementById('adminMsgContent').value = '';
                renderMessageAdminList();
                showToast('留言已添加', 'success');
            });
        }

        // ============================================================
        //  Markdown 辅助
        // ============================================================
        function insertMarkdown(type) {
            var textarea = document.getElementById('editContent');
            var start = textarea.selectionStart;
            var end = textarea.selectionEnd;
            var text = textarea.value;
            var before = text.substring(0, start);
            var selected = text.substring(start, end);
            var after = text.substring(end);
            var insert = '';
            if (type === 'image') { var url = prompt('请输入图片路径 / URL：'); if (url) insert = '![](' + url.trim() + ')'; }
            else if (type === 'link') { var url = prompt('请输入链接 URL:'); var txt = prompt('请输入链接文字:'); if (url && txt) insert = '[' + txt + '](' + url + ')'; }
            else if (type === 'video') { var url = prompt('请输入视频 URL：'); if (url) { url = url.trim(); if (url.includes('youtube.com/embed') || url.includes('bilibili.com')) { insert = '<iframe src="' + url + '" frameborder="0" allowfullscreen></iframe>'; } else { insert = '<video src="' + url + '" controls></video>'; } } }
            else if (type === 'flash') { var url = prompt('请输入 Flash 文件 URL：'); if (url) { insert = '<embed src="' + url.trim() + '" type="application/x-shockwave-flash" width="100%" height="400" />'; } }
            else if (type === 'bold') { insert = '**' + (selected || '加粗文字') + '**'; }
            else if (type === 'italic') { insert = '*' + (selected || '斜体文字') + '*'; }
            else if (type === 'code') { insert = '`' + (selected || '代码') + '`'; }
            if (insert) {
                textarea.value = before + insert + after;
                var newPos = start + insert.length;
                textarea.selectionStart = textarea.selectionEnd = newPos;
                textarea.focus();
                textarea.style.height = 'auto';
                textarea.style.height = textarea.scrollHeight + 'px';
            }
        }

        document.addEventListener('input', function(e) {
            if (e.target.classList && e.target.classList.contains('auto-grow')) {
                e.target.style.height = 'auto';
                e.target.style.height = e.target.scrollHeight + 'px';
            }
        });

        function sortPosts(arr) {
            return arr.slice().sort(function(a, b) {
                var dateDiff = new Date(b.date) - new Date(a.date);
                if (dateDiff !== 0) return dateDiff;
                return b.id - a.id;
            });
        }

        function initAdmin() {
            if (sessionStorage.getItem('blog_admin_logged') === 'true') { renderAdmin(); }
            else { showLogin(); }
        }

        loadAllData().then(function() {
            initAdmin();
        }).catch(function(err) {
            console.error('数据加载失败，使用默认配置:', err);
            applyConfig(DEFAULT_CONFIG);
            initAdmin();
        });
