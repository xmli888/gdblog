<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨韵轩 · 后台管理</title>
    <style>
        /* ---------- 全局 ---------- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: '楷体', 'KaiTi', serif;
            background: #f5efe6;
            color: #4a3728;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: #fff9f0;
            box-shadow: 0 8px 32px rgba(90, 60, 30, 0.15);
            border-radius: 16px;
            padding: 30px 35px;
            border: 1px solid #dacbb8;
        }
        h1 {
            font-size: 28px;
            font-weight: normal;
            border-bottom: 2px solid #b8a08a;
            padding-bottom: 12px;
            margin-bottom: 28px;
            color: #5d3e2b;
            letter-spacing: 4px;
        }
        h1 small { font-size: 16px; font-weight: normal; color: #8b7355; margin-left: 20px; }

        /* ---------- 登录面板 ---------- */
        #loginPanel {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
        }
        #loginPanel.show { display: flex; }
        #loginPanel textarea {
            width: 100%;
            max-width: 500px;
            height: 120px;
            padding: 12px 16px;
            border: 1px solid #c9b7a2;
            border-radius: 8px;
            background: #fcf8f2;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            resize: vertical;
        }
        #loginPanel button {
            margin-top: 16px;
            padding: 10px 40px;
            background: #7d5f44;
            color: #fff;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            cursor: pointer;
            letter-spacing: 4px;
            transition: 0.3s;
        }
        #loginPanel button:hover { background: #5d3e2b; }
        #loginStatus { margin-top: 12px; color: #b35a3a; font-size: 15px; }

        /* ---------- 管理主界面 ---------- */
        #adminPanel {
            display: none;
        }
        #adminPanel.show { display: block; }

        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 0;
            border-bottom: 2px solid #dacbb8;
            margin-bottom: 24px;
            padding-bottom: 6px;
        }
        .tab-btn {
            padding: 8px 22px;
            background: transparent;
            border: none;
            border-bottom: 3px solid transparent;
            font-size: 16px;
            font-family: inherit;
            color: #7d6b58;
            cursor: pointer;
            transition: 0.2s;
        }
        .tab-btn:hover { color: #3d2b1e; }
        .tab-btn.active {
            border-bottom-color: #7d5f44;
            color: #3d2b1e;
            font-weight: bold;
        }

        .tab-content {
            display: none;
            animation: fade 0.25s ease;
        }
        .tab-content.active { display: block; }
        @keyframes fade { from { opacity: 0.4; } to { opacity: 1; } }

        .table-wrap {
            overflow-x: auto;
            margin-top: 14px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            background: #fcf8f2;
            border-radius: 8px;
            overflow: hidden;
        }
        th {
            background: #e6dbce;
            color: #3d2b1e;
            font-weight: normal;
            padding: 10px 12px;
            text-align: left;
            border-bottom: 2px solid #c9b7a2;
        }
        td {
            padding: 10px 12px;
            border-bottom: 1px solid #e6dbce;
            vertical-align: middle;
        }
        tr:hover { background: #f5ede4; }

        .badge {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 30px;
            font-size: 12px;
            color: #fff;
            background: #b0a090;
        }
        .badge.approved { background: #5f8b6f; }
        .badge.pending { background: #d4a054; }
        .badge.rejected { background: #b35a3a; }

        .star {
            cursor: pointer;
            color: #d4a054;
            font-size: 20px;
            transition: 0.2s;
            user-select: none;
        }
        .star.on { color: #e8b830; }
        .star:hover { transform: scale(1.2); }

        .action-group button {
            margin: 2px 4px;
            padding: 4px 12px;
            border: none;
            border-radius: 4px;
            background: #dacbb8;
            color: #3d2b1e;
            cursor: pointer;
            font-size: 13px;
            font-family: inherit;
            transition: 0.2s;
        }
        .action-group button:hover { background: #c9b7a2; }
        .action-group button.approve { background: #5f8b6f; color: #fff; }
        .action-group button.reject { background: #b35a3a; color: #fff; }
        .action-group button.danger { background: #a0524a; color: #fff; }

        /* 筛选栏 & 添加表单 */
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 20px;
            align-items: center;
            margin-bottom: 16px;
            padding: 12px 16px;
            background: #f5ede4;
            border-radius: 8px;
        }
        .filter-bar select, .filter-bar input {
            padding: 6px 12px;
            border: 1px solid #c9b7a2;
            border-radius: 4px;
            background: #fff;
            font-family: inherit;
            font-size: 14px;
        }
        .filter-bar button {
            padding: 6px 18px;
            background: #7d5f44;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
        }
        .filter-bar button:hover { background: #5d3e2b; }

        .add-form {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin: 20px 0 10px;
            padding: 16px;
            background: #f5ede4;
            border-radius: 8px;
        }
        .add-form input, .add-form textarea {
            padding: 6px 12px;
            border: 1px solid #c9b7a2;
            border-radius: 4px;
            font-family: inherit;
            font-size: 14px;
            background: #fff;
        }
        .add-form input { flex: 0 0 160px; }
        .add-form textarea { flex: 1; min-width: 200px; height: 40px; resize: vertical; }
        .add-form button { padding: 6px 24px; background: #5f8b6f; color: #fff; border: none; border-radius: 4px; cursor: pointer; }

        /* 编辑模态框 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 999;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: #fff9f0;
            padding: 30px 35px;
            border-radius: 16px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 8px 40px rgba(0,0,0,0.3);
        }
        .modal-box h3 { margin-bottom: 16px; }
        .modal-box textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            border: 1px solid #c9b7a2;
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
        }
        .modal-box .btn-row {
            margin-top: 16px;
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        .modal-box .btn-row button {
            padding: 6px 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
        }
        .modal-box .btn-row .save { background: #5f8b6f; color: #fff; }
        .modal-box .btn-row .cancel { background: #dacbb8; }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #3d2b1e;
            color: #f5efe6;
            padding: 10px 28px;
            border-radius: 30px;
            font-size: 15px;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
            z-index: 9999;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>
<div class="container">
    <h1>墨韵轩 · 后台 <small>管理面板</small></h1>

    <!-- 登录面板 -->
    <div id="loginPanel" class="show">
        <p style="margin-bottom:12px;color:#7d6b58;">请输入您的 RSA 私钥进行验证</p>
        <textarea id="privateKeyInput" placeholder="-----BEGIN PRIVATE KEY-----..."></textarea>
        <button id="loginBtn">登 录</button>
        <div id="loginStatus"></div>
    </div>

    <!-- 管理面板 -->
    <div id="adminPanel">
        <div class="tabs">
            <button class="tab-btn active" data-tab="tabMessages">📝 留言管理</button>
            <button class="tab-btn" data-tab="tabPosts">📄 文章管理</button>
            <button class="tab-btn" data-tab="tabFonts">🔤 字体管理</button>
            <button class="tab-btn" data-tab="tabMusic">🎵 音乐管理</button>
            <button class="tab-btn" data-tab="tabSecurity">🔒 安全设置</button>
            <button class="tab-btn" data-tab="tabGitHub">📡 GitHub</button>
            <button class="tab-btn" data-tab="tabBackup">💾 备份</button>
        </div>

        <!-- ============ 留言管理 ============ -->
        <div id="tabMessages" class="tab-content active">
            <h2 style="font-weight:normal;font-size:20px;margin-bottom:12px;">留言板管理</h2>
            <!-- 筛选栏 -->
            <div class="filter-bar">
                <label>筛选状态：</label>
                <select id="msgFilter">
                    <option value="all">全部</option>
                    <option value="pending">待审核</option>
                    <option value="approved">已审核</option>
                    <option value="rejected">已驳回</option>
                </select>
                <button id="refreshMessages">🔄 刷新列表</button>
                <span style="color:#8b7355;font-size:13px;margin-left:auto;">共 <span id="msgCount">0</span> 条</span>
            </div>
            <!-- 表格 -->
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th style="width:40px;">#</th>
                            <th style="width:90px;">昵称</th>
                            <th style="width:130px;">邮箱</th>
                            <th>内容</th>
                            <th style="width:100px;">时间</th>
                            <th style="width:70px;">状态</th>
                            <th style="width:60px;">精选</th>
                            <th style="width:200px;">操作</th>
                        </tr>
                    </thead>
                    <tbody id="msgTableBody">
                        <tr><td colspan="8" style="text-align:center;color:#8b7355;">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
            <!-- 手动添加 -->
            <div class="add-form">
                <input type="text" id="addMsgNick" placeholder="昵称" />
                <input type="email" id="addMsgEmail" placeholder="邮箱 (可选)" />
                <textarea id="addMsgContent" placeholder="留言内容..."></textarea>
                <button id="addMsgBtn">➕ 手动添加（直接通过）</button>
            </div>
        </div>

        <!-- ============ 文章管理（简略占位） ============ -->
        <div id="tabPosts" class="tab-content">
            <p style="color:#8b7355;">文章管理功能已集成在 common.js 中，此处略。如需完整展示请告知。</p>
        </div>

        <!-- ============ 字体管理（简略占位） ============ -->
        <div id="tabFonts" class="tab-content">
            <p style="color:#8b7355;">字体管理功能已集成，此处略。</p>
        </div>

        <!-- ============ 音乐管理（简略占位） ============ -->
        <div id="tabMusic" class="tab-content">
            <p style="color:#8b7355;">音乐管理功能已集成，此处略。</p>
        </div>

        <!-- ============ 安全设置（简略占位） ============ -->
        <div id="tabSecurity" class="tab-content">
            <p style="color:#8b7355;">安全设置功能已集成，此处略。</p>
        </div>

        <!-- ============ GitHub（简略占位） ============ -->
        <div id="tabGitHub" class="tab-content">
            <p style="color:#8b7355;">GitHub 配置功能已集成，此处略。</p>
        </div>

        <!-- ============ 备份（简略占位） ============ -->
        <div id="tabBackup" class="tab-content">
            <p style="color:#8b7355;">备份功能已集成，此处略。</p>
        </div>
    </div>
</div>

<!-- 编辑模态框 -->
<div class="modal-overlay" id="editModal">
    <div class="modal-box">
        <h3>✏️ 编辑留言</h3>
        <textarea id="editContent" placeholder="修改留言内容..."></textarea>
        <div class="btn-row">
            <button class="cancel" id="editCancel">取消</button>
            <button class="save" id="editSave">保存</button>
        </div>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="common.js"></script>
<script>
(function() {
    // ---------- 全局变量 ----------
    let allMessages = [];
    let editingId = null;
    let currentFilter = 'all';

    // DOM 引用
    const loginPanel = document.getElementById('loginPanel');
    const adminPanel = document.getElementById('adminPanel');
    const privateKeyInput = document.getElementById('privateKeyInput');
    const loginBtn = document.getElementById('loginBtn');
    const loginStatus = document.getElementById('loginStatus');
    const msgTableBody = document.getElementById('msgTableBody');
    const msgFilter = document.getElementById('msgFilter');
    const refreshBtn = document.getElementById('refreshMessages');
    const msgCount = document.getElementById('msgCount');
    const addNick = document.getElementById('addMsgNick');
    const addEmail = document.getElementById('addMsgEmail');
    const addContent = document.getElementById('addMsgContent');
    const addBtn = document.getElementById('addMsgBtn');
    const editModal = document.getElementById('editModal');
    const editContent = document.getElementById('editContent');
    const editCancel = document.getElementById('editCancel');
    const editSave = document.getElementById('editSave');
    const toastEl = document.getElementById('toast');

    // ---------- 工具函数 ----------
    function showToast(msg) {
        toastEl.textContent = msg;
        toastEl.classList.add('show');
        clearTimeout(toastEl._timer);
        toastEl._timer = setTimeout(() => toastEl.classList.remove('show'), 2500);
    }

    // ---------- 登录逻辑（复用 common.js 的 hybridDecrypt） ----------
    async function doLogin() {
        const privateKey = privateKeyInput.value.trim();
        if (!privateKey.includes('-----BEGIN PRIVATE KEY-----')) {
            loginStatus.textContent = '安全验证失败，请检查您输入的密钥是否正确。';
            return;
        }
        loginStatus.textContent = '验证中...';
        try {
            let pub, cipher, expected;
            // 优先 localStorage
            const localSec = localStorage.getItem('security_config');
            if (localSec) {
                try {
                    const obj = JSON.parse(localSec);
                    pub = obj.publicKey;
                    cipher = obj.challengeCipher;
                    expected = obj.expectedPlain || '888999';
                } catch(e) {}
            }
            if (!pub) {
                // 读取 config.json
                try {
                    const cfg = await loadConfig();
                    if (cfg && cfg.security) {
                        pub = cfg.security.publicKey;
                        cipher = cfg.security.challengeCipher;
                        expected = cfg.security.expectedPlain || '888999';
                    }
                } catch(e) {}
            }
            if (!pub) {
                // 硬编码默认
                pub = DEFAULT_CONFIG.security.publicKey;
                cipher = DEFAULT_CONFIG.security.challengeCipher;
                expected = DEFAULT_CONFIG.security.expectedPlain || '888999';
            }
            if (!pub || !cipher) {
                loginStatus.textContent = '安全验证机制数据损坏，请联系网络安全管理员处理。';
                return;
            }
            // 解密
            const decrypted = await hybridDecrypt(cipher, privateKey);
            if (decrypted === expected) {
                loginStatus.textContent = '验证通过，正在加载...';
                sessionStorage.setItem('admin_auth', 'true');
                loginPanel.classList.remove('show');
                adminPanel.classList.add('show');
                loadMessagesList();
            } else {
                loginStatus.textContent = '安全验证失败，请检查您输入的密钥是否正确。';
            }
        } catch (err) {
            console.error(err);
            loginStatus.textContent = '网络错误，服务暂时不可用，请稍后重试。';
        }
    }

    // ---------- 加载留言列表 ----------
    async function loadMessagesList() {
        try {
            const data = await loadMessages();
            allMessages = Array.isArray(data) ? data : [];
            renderMessages();
        } catch (e) {
            console.error(e);
            showToast('加载留言失败，请检查网络或 GitHub 配置。');
            allMessages = [];
            renderMessages();
        }
    }

    function renderMessages() {
        const filter = msgFilter.value;
        currentFilter = filter;
        let filtered = allMessages;
        if (filter !== 'all') {
            filtered = filtered.filter(m => m.status === filter);
        }
        // 按时间降序
        filtered.sort((a, b) => (a.time || '').localeCompare(b.time || '') * -1);

        msgCount.textContent = filtered.length;

        if (filtered.length === 0) {
            msgTableBody.innerHTML = `<tr><td colspan="8" style="text-align:center;color:#8b7355;">暂无留言</td></tr>`;
            return;
        }

        let html = '';
        filtered.forEach((msg, idx) => {
            const statusMap = {
                'pending': '<span class="badge pending">待审核</span>',
                'approved': '<span class="badge approved">已审核</span>',
                'rejected': '<span class="badge rejected">已驳回</span>'
            };
            const statusBadge = statusMap[msg.status] || '<span class="badge">未知</span>';
            const starred = msg.starred === true;
            const starHtml = `<span class="star ${starred ? 'on' : ''}" data-id="${msg.id}" data-action="star">${starred ? '★' : '☆'}</span>`;

            html += `<tr>
                <td>${idx + 1}</td>
                <td><strong>${escapeHtml(msg.nickname || '匿名')}</strong></td>
                <td>${escapeHtml(msg.email || '')}</td>
                <td style="max-width:300px;word-break:break-word;">${escapeHtml(msg.content || '')}</td>
                <td style="font-size:12px;color:#7d6b58;">${msg.time || ''}</td>
                <td>${statusBadge}</td>
                <td>${starHtml}</td>
                <td class="action-group">
                    ${msg.status === 'pending' ? `<button class="approve" data-id="${msg.id}" data-action="approve">✅ 通过</button>` : ''}
                    ${msg.status === 'pending' ? `<button class="reject" data-id="${msg.id}" data-action="reject">⛔ 驳回</button>` : ''}
                    ${msg.status === 'rejected' ? `<button class="approve" data-id="${msg.id}" data-action="approve">↩️ 恢复</button>` : ''}
                    <button data-id="${msg.id}" data-action="edit">✏️ 编辑</button>
                    <button class="danger" data-id="${msg.id}" data-action="delete">🗑️ 删除</button>
                </td>
            </tr>`;
        });
        msgTableBody.innerHTML = html;

        // 绑定事件（委托）
        msgTableBody.querySelectorAll('[data-action]').forEach(el => {
            el.addEventListener('click', function(e) {
                const action = this.dataset.action;
                const id = this.dataset.id;
                if (action === 'star') handleStar(id);
                else if (action === 'approve') handleApprove(id);
                else if (action === 'reject') handleReject(id);
                else if (action === 'edit') handleEdit(id);
                else if (action === 'delete') handleDelete(id);
            });
        });
    }

    // 简易防 XSS
    function escapeHtml(text) {
        if (!text) return '';
        const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
        return String(text).replace(/[&<>"']/g, m => map[m]);
    }

    // ---------- 操作函数 ----------
    function findMsg(id) { return allMessages.find(m => m.id === id); }

    async function saveAndReload() {
        try {
            await saveMessages(allMessages);
            showToast('✅ 操作成功，已同步至 GitHub');
            await loadMessagesList();
        } catch (e) {
            console.error(e);
            showToast('❌ 保存失败，请检查网络');
        }
    }

    async function handleStar(id) {
        const msg = findMsg(id);
        if (!msg) return;
        msg.starred = !msg.starred;
        await saveAndReload();
    }

    async function handleApprove(id) {
        const msg = findMsg(id);
        if (!msg) return;
        msg.status = 'approved';
        await saveAndReload();
    }

    async function handleReject(id) {
        const msg = findMsg(id);
        if (!msg) return;
        msg.status = 'rejected';
        await saveAndReload();
    }

    function handleEdit(id) {
        const msg = findMsg(id);
        if (!msg) { showToast('留言不存在'); return; }
        editingId = id;
        editContent.value = msg.content || '';
        editModal.classList.add('show');
    }

    async function handleDelete(id) {
        if (!confirm('确定要删除这条留言吗？此操作不可撤销。')) return;
        allMessages = allMessages.filter(m => m.id !== id);
        await saveAndReload();
    }

    // ---------- 编辑模态框 ----------
    editCancel.addEventListener('click', () => {
        editModal.classList.remove('show');
        editingId = null;
    });
    editSave.addEventListener('click', async () => {
        if (!editingId) return;
        const msg = findMsg(editingId);
        if (!msg) { showToast('留言不存在'); return; }
        const newContent = editContent.value.trim();
        if (!newContent) { showToast('内容不能为空'); return; }
        msg.content = newContent;
        await saveAndReload();
        editModal.classList.remove('show');
        editingId = null;
    });
    // 点击背景关闭
    editModal.addEventListener('click', function(e) {
        if (e.target === this) { this.classList.remove('show'); editingId = null; }
    });

    // ---------- 手动添加 ----------
    addBtn.addEventListener('click', async () => {
        const nickname = addNick.value.trim() || '管理员';
        const email = addEmail.value.trim() || '';
        const content = addContent.value.trim();
        if (!content) { showToast('请填写留言内容'); return; }
        const newMsg = {
            id: 'msg_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
            nickname: nickname,
            email: email,
            content: content,
            time: new Date().toLocaleString('zh-CN', { hour12: false }),
            status: 'approved',   // 直接通过
            starred: false
        };
        allMessages.push(newMsg);
        await saveAndReload();
        addNick.value = '';
        addEmail.value = '';
        addContent.value = '';
        showToast('✅ 手动添加成功（已直接通过审核）');
    });

    // ---------- 筛选切换 ----------
    msgFilter.addEventListener('change', renderMessages);
    refreshBtn.addEventListener('click', loadMessagesList);

    // ---------- Tab 切换 ----------
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            const target = document.getElementById(this.dataset.tab);
            if (target) target.classList.add('active');
        });
    });

    // ---------- 登录按钮 ----------
    loginBtn.addEventListener('click', doLogin);
    privateKeyInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') doLogin(); });

    // ---------- 检查登录状态 ----------
    (function init() {
        if (sessionStorage.getItem('admin_auth') === 'true') {
            loginPanel.classList.remove('show');
            adminPanel.classList.add('show');
            loadMessagesList();
        } else {
            loginPanel.classList.add('show');
            adminPanel.classList.remove('show');
        }
    })();

})();
</script>
</body>
</html>
