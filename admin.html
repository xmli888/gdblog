<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>墨韵轩 · 后台管理</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background-color: #f6efe8;
            font-family: '华文楷体','KaiTi','SimSun','宋体', serif;
            color: #3e2723;
            min-height: 100vh;
            padding: 20px;
        }
        a { text-decoration: none; color: inherit; }
        .container { max-width: 1000px; margin:0 auto; }
        .card {
            background: #fdf8f0;
            border: 1px solid #e8d5c0;
            border-radius: 12px;
            padding: 24px 28px;
            box-shadow: 0 2px 12px rgba(60,40,30,0.06);
            margin-bottom: 20px;
        }
        .card-title {
            font-size:20px; font-weight:normal; letter-spacing:4px;
            color:#4d281b;
            border-bottom:2px solid #e8d5c0;
            padding-bottom:10px; margin-bottom:16px;
            font-family: '华文楷体','KaiTi',serif;
        }
        .login-box {
            max-width:420px;
            margin:60px auto;
            padding:30px 28px 40px;
            background:#fdf8f0;
            border:1px solid #e8d5c0;
            border-radius:12px;
            box-shadow:0 4px 20px rgba(0,0,0,0.06);
            text-align:center;
        }
        .login-box h2 { font-weight:normal; letter-spacing:6px; font-family:'华文楷体','KaiTi',serif; color:#4d281b; margin-bottom:8px; }
        .login-box .login-sub { color:#8a7a6a; font-size:14px; margin-bottom:24px; }
        .login-box .form-group { margin-bottom:24px; text-align:left; }
        .login-box .form-group label { display:block; font-size:14px; color:#4d281b; font-weight:bold; margin-bottom:6px; text-align:center; }
        .login-box .form-group textarea { width:100%; padding:12px 14px; border:1px solid #ddd0c0; border-radius:6px; background:#fefcf8; font-size:14px; font-family:'Courier New',monospace; resize:vertical; min-height:100px; outline:none; text-align:left; margin:0 auto; }
        .login-box .form-group textarea:focus { border-color:#c23531; }
        .login-box .btn { width:100%; padding:14px; background:#c23531; color:#f5e6d3; border:none; border-radius:6px; font-size:16px; font-family:'华文楷体','KaiTi',serif; letter-spacing:4px; cursor:pointer; transition:0.2s; margin-top:8px; }
        .login-box .btn:hover { background:#a02a26; }
        .login-box .error-msg { color:#c23531; text-align:center; margin-top:16px; display:none; }
        .panel { border:1px solid #e8d5c0; border-radius:8px; margin-bottom:12px; background:#fdf8f0; }
        .panel-header { padding:12px 18px; background:#efe4d8; cursor:pointer; display:flex; justify-content:space-between; align-items:center; font-family:'华文楷体','KaiTi',serif; font-size:16px; letter-spacing:2px; border-radius:8px 8px 0 0; user-select:none; }
        .panel-header:hover { background:#e8d5c0; }
        .panel-header .arrow { transition:transform 0.3s; }
        .panel-header .arrow.open { transform:rotate(180deg); }
        .panel-body { padding:16px 18px; display:none; border-top:1px solid #e8d5c0; }
        .panel-body.open { display:block; }
        .admin-form .form-group { margin-bottom:14px; }
        .admin-form .form-group label { display:block; font-size:14px; color:#4d281b; font-weight:bold; margin-bottom:4px; }
        .admin-form .form-group input,
        .admin-form .form-group textarea,
        .admin-form .form-group select { width:100%; padding:8px 12px; border:1px solid #ddd0c0; border-radius:6px; background:#fefcf8; font-size:14px; font-family:'SimSun','宋体',serif; outline:none; transition:border 0.2s; min-height:38px; box-sizing:border-box; }
        .admin-form .form-group input:focus,
        .admin-form .form-group textarea:focus,
        .admin-form .form-group select:focus { border-color:#c23531; }
        .admin-form .form-group textarea { min-height:80px; resize:vertical; }
        .admin-form .form-group textarea.auto-grow { min-height:120px; overflow:hidden; resize:none; }
        .admin-form .btn-group { display:flex; flex-wrap:wrap; gap:10px; margin-top:8px; }
        .admin-form .btn-group .btn { flex:0 1 auto; }
        .admin-form .btn { padding:6px 18px; border:none; border-radius:6px; background:#7a4a34; color:#f5e6d3; font-family:'华文楷体','KaiTi',serif; font-size:14px; letter-spacing:2px; cursor:pointer; transition:0.2s; }
        .admin-form .btn:hover { background:#5a3222; }
        .admin-form .btn-primary { background:#c23531; }
        .admin-form .btn-primary:hover { background:#a02a26; }
        .admin-form .btn-danger { background:#8b2500; }
        .admin-form .btn-danger:hover { background:#6b1a00; }
        .admin-form .btn-secondary { background:#6b7b8b; }
        .admin-form .btn-secondary:hover { background:#5a6a7a; }
        .admin-form .btn-success { background:#2a7a4a; }
        .admin-form .btn-success:hover { background:#1a5a3a; }
        .admin-list .item { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px dashed #e8d5c0; flex-wrap:wrap; gap:8px; }
        .admin-list .item .actions button { margin-left:6px; padding:2px 12px; border:1px solid #ddd0c0; border-radius:4px; background:transparent; cursor:pointer; font-size:12px; }
        .admin-list .item .actions .edit:hover { background:#7a4a34; color:#fff; }
        .admin-list .item .actions .del:hover { background:#8b2500; color:#fff; }
        .admin-list .item .actions .approve:hover { background:#2a7a4a; color:#fff; }
        .admin-list .item .actions .featured:hover { background:#c23531; color:#fff; }
        .admin-list .item .status-badge { font-size:11px; padding:2px 10px; border-radius:12px; background:#e8d5c0; color:#6b5a4a; }
        .admin-list .item .status-badge.approved { background:#2a7a4a; color:#fff; }
        .admin-list .item .status-badge.pending { background:#f59e0b; color:#fff; }
        .admin-list .item .status-badge.rejected { background:#8b2500; color:#fff; }
        .help-text { font-size:13px; color:#6b5a4a; background:#f5efe8; padding:8px 12px; border-radius:6px; border-left:3px solid #c23531; margin-bottom:10px; line-height:1.6; font-family:'SimSun','宋体',serif; }
        .help-text code { background:#e8ddd0; padding:1px 6px; border-radius:3px; font-size:12px; color:#3e2723; font-family:'Courier New',monospace; }
        .toast-msg { position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:#3e2723; color:#f5e6d3; padding:12px 28px; border-radius:8px; font-size:15px; z-index:9999; box-shadow:0 4px 20px rgba(0,0,0,0.3); opacity:0; transition:opacity 0.3s; pointer-events:none; max-width:90%; text-align:center; font-family:'华文楷体','KaiTi',serif; letter-spacing:1px; }
        .toast-msg.show { opacity:1; }
        .footer-admin { display:inline-flex; align-items:center; gap:4px; color:#8a7a6a; cursor:pointer; transition:0.2s; font-size:13px; font-family:'SimSun','宋体',serif; padding:6px 12px; border-radius:4px; -webkit-touch-callout:none; }
        .footer-admin:hover { color:#c23531; background:rgba(194,53,49,0.05); }
        .footer-admin:active { transform:scale(0.95); }
        @media (max-width:600px) { .card { padding:16px; } .admin-form .btn-group .btn { flex:1 1 100%; } }
    </style>
</head>
<body>
    <div id="toastContainer" class="toast-msg"></div>
    <div class="container" id="app"></div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="common.js"></script>

    <script>
        // ============================================================
        //  后台管理脚本（登录机制与原始代码完全一致）
        // ============================================================

        var currentPage = 'admin';

        // ============================================================
        //  ★★★ 您的登录界面（原封不动）★★★
        // ============================================================
        function showLogin() {
            var html = '<div class="login-box"><h2>🔐 后台登录</h2><div class="login-sub">— 使用私钥验证身份 —</div><div class="form-group"><label>🔑 私钥 (PEM 格式)</label><textarea id="loginPrivateKey" rows="4" placeholder="-----BEGIN PRIVATE KEY----- ... -----END PRIVATE KEY-----"></textarea></div><button class="btn" onclick="doLogin()">登录</button><div id="loginError" class="error-msg"></div><div style="margin-top:20px;font-size:13px;color:#8a7a6a;"><a href="index.html" style="color:#c23531;text-decoration:underline;">← 返回首页</a></div></div>';
            document.getElementById('app').innerHTML = html;
        }

        // ============================================================
        //  ★★★ 您的登录验证函数（三步优先级，原封不动）★★★
        // ============================================================
        function doLogin() {
            var privKey = document.getElementById('loginPrivateKey').value.trim();
            var errorEl = document.getElementById('loginError');
            if (!privKey) {
                errorEl.textContent = '请输入私钥';
                errorEl.style.display = 'block';
                return;
            }

            // 第一步：从 localStorage 读取配置
            var stored = localStorage.getItem('security_config');
            var security = stored ? JSON.parse(stored) : null;

            // 第二步：如果 localStorage 没有，从 DEFAULT_CONFIG 读取（此时已包含您的硬编码默认值）
            if (!security || !security.challengeCipher || !security.expectedPlain) {
                if (DEFAULT_CONFIG.security && DEFAULT_CONFIG.security.challengeCipher) {
                    security = DEFAULT_CONFIG.security;
                    localStorage.setItem('security_config', JSON.stringify(security));
                } else {
                    errorEl.textContent = '安全配置缺失，请检查 config.json';
                    errorEl.style.display = 'block';
                    return;
                }
            }

            // 第三步：用私钥解密挑战码，比对明文
            hybridDecrypt(security.challengeCipher, privKey)
                .then(function(plain) {
                    if (plain === security.expectedPlain) {
                        sessionStorage.setItem('blog_admin_logged', 'true');
                        showToast('登录成功', 'success');
                        renderAdmin();
                    } else {
                        errorEl.textContent = '解密结果不匹配，请检查私钥';
                        errorEl.style.display = 'block';
                    }
                })
                .catch(function(err) {
                    errorEl.textContent = '私钥错误: ' + err.message;
                    errorEl.style.display = 'block';
                });
        }

        function logout() {
            if (confirm('确定退出后台吗？')) {
                sessionStorage.removeItem('blog_admin_logged');
                showLogin();
                showToast('已退出', 'info');
            }
        }

        // ============================================================
        //  渲染管理面板（与之前相同，但保留安全设置面板）
        // ============================================================
        function renderAdmin() {
            var container = document.getElementById('app');
            container.innerHTML = '<div class="card"><div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;"><div class="card-title" style="border-bottom:none; margin-bottom:0;">🔐 后台管理</div><div><span style="color:#8a7a6a;font-size:14px;margin-right:16px;">已登录</span><button class="footer-admin" onclick="logout()" style="border:1px solid #c23531;border-radius:6px;padding:6px 16px;background:transparent;color:#c23531;cursor:pointer;">退出</button><a href="index.html" style="margin-left:12px;color:#8a7a6a;text-decoration:underline;">← 返回首页</a></div></div></div>' +
                '<div class="panel"><div class="panel-header" onclick="togglePanel(this)">⚙️ 站点设置 <span class="arrow">▼</span></div><div class="panel-body"><div class="admin-form"><div class="form-group"><label>Logo 文字</label><input type="text" id="setLogo" /></div><div class="form-group"><label>博客标题</label><input type="text" id="setTitle" /></div><div class="form-group"><label>博客副标题</label><input type="text" id="setSub" /></div><div class="form-group"><label>作者名</label><input type="text" id="setAuthor" /></div><div class="form-group"><label>作者简介</label><textarea id="setAuthorDesc" rows="2"></textarea></div><div class="btn-group"><button class="btn btn-primary" onclick="saveSiteSettings()">保存</button></div></div></div></div>' +
                '<div class="panel" id="newPostPanel"><div class="panel-header" onclick="togglePanel(this)">✏️ 写新文章 <span class="arrow">▼</span></div><div class="panel-body"><div class="admin-form"><div class="form-group"><label>标题</label><input type="text" id="editTitle" /></div><div class="form-row" style="display:flex; gap:10px; flex-wrap:wrap;"><div class="form-group" style="flex:1;"><label>分类</label><select id="editCategory"></select><div style="display:flex; gap:6px; margin-top:4px;"><input type="text" id="newCategoryQuick" placeholder="新分类名称" style="flex:1;padding:8px 10px;border:1px solid #ddd0c0;border-radius:4px;font-size:13px;min-height:38px;" /><button class="btn btn-secondary" onclick="quickAddCategory()" style="padding:2px 12px;font-size:12px;min-height:38px;">+ 添加</button></div></div><div class="form-group" style="flex:1;"><label>标签 (逗号分隔)</label><input type="text" id="editTags" /></div></div><div class="form-row" style="display:flex; gap:10px; flex-wrap:wrap;"><div class="form-group" style="flex:1;"><label>作者</label><input type="text" id="editAuthor" /></div><div class="form-group" style="flex:1;"><label>日期</label><input type="date" id="editDate" /></div><div class="form-group" style="flex:0 0 100px;"><label>阅读数</label><input type="number" id="editViews" min="0" /></div><div class="form-group" style="flex:0 0 100px;"><label>点赞数</label><input type="number" id="editLikes" min="0" /></div></div><div class="form-group"><label>正文 (支持 Markdown)</label><div style="display:flex; gap:6px; margin-bottom:4px; flex-wrap:wrap;"><button class="btn btn-secondary" onclick="insertMarkdown(\'image\')">🖼️ 图片</button><button class="btn btn-secondary" onclick="insertMarkdown(\'link\')">🔗 链接</button><button class="btn btn-secondary" onclick="insertMarkdown(\'video\')">🎬 视频</button><button class="btn btn-secondary" onclick="insertMarkdown(\'flash\')">📦 Flash</button><button class="btn btn-secondary" onclick="insertMarkdown(\'bold\')">B</button><button class="btn btn-secondary" onclick="insertMarkdown(\'italic\')">I</button><button class="btn btn-secondary" onclick="insertMarkdown(\'code\')">&lt;/&gt;</button></div><textarea id="editContent" class="auto-grow" rows="4"></textarea></div><input type="hidden" id="editId" /><div class="btn-group"><button class="btn btn-primary" onclick="savePost()">保存文章</button><button class="btn btn-secondary" onclick="clearEditForm()">清空表单</button></div></div></div></div>' +
                '<div class="panel"><div class="panel-header" onclick="togglePanel(this)">📄 文章管理 <span class="arrow">▼</span></div><div class="panel-body"><div class="admin-list" id="adminPostList"></div></div></div>' +
                '<div class="panel"><div class="panel-header" onclick="togglePanel(this)">📂 分类管理 <span class="arrow">▼</span></div><div class="panel-body"><div class="admin-form"><div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center;"><input type="text" id="newCategoryName" placeholder="新分类名称" style="flex:1;min-height:38px;" /><button class="btn btn-primary" onclick="addCategory()" style="min-height:38px;">添加</button></div><div class="admin-list" id="categoryAdminList"></div></div></div></div>' +
                '<div class="panel"><div class="panel-header" onclick="togglePanel(this)">🏷️ 标签管理 <span class="arrow">▼</span></div><div class="panel-body"><div class="admin-form"><div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center;"><input type="text" id="newTagName" placeholder="新标签名称" style="flex:1;min-height:38px;" /><button class="btn btn-primary" onclick="addTag()" style="min-height:38px;">添加</button></div><div class="admin-list" id="tagAdminList"></div></div></div></div>' +
                '<div class="panel"><div class="panel-header" onclick="togglePanel(this)">🔤 字体管理 <span class="arrow">▼</span></div><div class="panel-body"><div class="admin-form"><div class="help-text">💡 支持系统字体名称（如 <code>楷体</code>），也支持自定义字体路径或网络字体 URL。</div><div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:8px;"><input type="text" id="newFontName" placeholder="字体名称 / 路径 / URL" style="flex:1;min-height:38px;" /><button class="btn btn-primary" onclick="addFont()" style="min-height:38px;">添加</button></div><div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:10px;"><label style="font-weight:bold;">默认字体</label><select id="defaultFontSelect" style="min-height:38px;padding:6px 10px;"></select><button class="btn btn-secondary" onclick="setDefaultFont()" style="min-height:38px;">设为默认</button><button class="btn btn-secondary" onclick="resetFonts()" style="min-height:38px;">重置默认列表</button></div><div style="display:flex; gap:10px; align-items:center; margin-bottom:10px;"><label style="font-weight:bold;">前台字体切换</label><input type="checkbox" id="fontSwitchCheck" onchange="saveFontSettings()" /><span style="font-size:13px; color:#8a7a6a;">开启后用户可自定义字体</span></div><div class="admin-list" id="fontAdminList"></div></div></div></div>' +
                '<div class="panel"><div class="panel-header" onclick="togglePanel(this)">🎵 音乐管理 <span class="arrow">▼</span></div><div class="panel-body"><div class="admin-form"><div class="help-text">💡 支持本地音乐路径或网络音乐链接。</div><div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:8px;"><input type="text" id="newMusicName" placeholder="歌曲名" style="flex:1;min-height:38px;" /><input type="text" id="newMusicUrl" placeholder="路径 / URL" style="flex:2;min-height:38px;" /><button class="btn btn-primary" onclick="addMusic()" style="min-height:38px;">添加</button></div><div style="display:flex; gap:20px; flex-wrap:wrap; margin-bottom:10px;"><label><input type="checkbox" id="musicEnabledCheck" onchange="saveMusicSettings()" /> 显示播放器</label><label><input type="checkbox" id="musicAutoPlayCheck" onchange="saveMusicSettings()" /> 自动播放</label><label>默认歌曲 <select id="musicDefaultSelect" style="min-height:38px;padding:6px 10px;"></select></label></div><div class="admin-list" id="musicAdminList"></div></div></div></div>' +
                '<div class="panel"><div class="panel-header" onclick="togglePanel(this)">📜 关于页面 <span class="arrow">▼</span></div><div class="panel-body"><div class="admin-form"><div class="form-group"><textarea id="aboutEditor" rows="6"></textarea></div><button class="btn btn-primary" onclick="saveAbout()">保存关于</button></div></div></div>' +
                // ★★★ 安全设置面板（原封不动保留）★★★
                '<div class="panel"><div class="panel-header" onclick="togglePanel(this)">🔐 安全设置 <span class="arrow">▼</span></div><div class="panel-body"><div class="admin-form"><div class="form-group"><label>公钥</label><textarea id="secPublicKey" rows="3" style="font-family:monospace;font-size:12px;"></textarea></div><div class="form-group"><label>挑战码密文</label><textarea id="secChallengeCipher" rows="2" style="font-family:monospace;font-size:12px;"></textarea></div><div class="form-group"><label>期望明文</label><input type="text" id="secExpectedPlain" style="min-height:38px;" /></div><div class="btn-group"><button class="btn btn-primary" onclick="saveSecuritySettings()">保存安全设置</button><button class="btn btn-secondary" onclick="resetSecuritySettings()">恢复默认</button></div></div></div></div>' +
                '<div class="panel" id="githubConfigPanel"><div class="panel-header" onclick="togglePanel(this)">⚙️ GitHub 设置 <span class="arrow">▼</span></div><div class="panel-body"><div class="admin-form"><div class="help-text">💡 配置 GitHub Token 后，文章和配置才能保存到远程仓库。<a href="https://github.com/settings/tokens" target="_blank" style="color:#c23531;text-decoration:underline;">点击此处生成 Token</a>（需勾选 <code>repo</code> 权限）。</div><div class="form-group"><label>🔑 Personal Access Token</label><input type="password" id="githubTokenInput" placeholder="ghp_xxxxxxxxxxxx" style="min-height:38px;" /></div><div class="form-group"><label>👤 GitHub 用户名</label><input type="text" id="githubUserInput" placeholder="你的用户名" style="min-height:38px;" /></div><div class="form-group"><label>📁 仓库名</label><input type="text" id="githubRepoInput" placeholder="仓库名" style="min-height:38px;" /></div><div class="btn-group"><button class="btn btn-primary" onclick="saveGitHubConfig()">保存配置</button><button class="btn btn-secondary" onclick="clearGitHubConfig()">清空配置</button></div><div id="githubConfigStatus" style="margin-top:8px;font-size:13px;color:#8a7a6a;"></div></div></div></div>' +
                '<div class="panel" id="backupPanel"><div class="panel-header" onclick="togglePanel(this)">💾 备份设置 <span class="arrow">▼</span></div><div class="panel-body"><div class="admin-form"><div class="help-text">💡 备份当前文章、配置和留言数据。<br/>可下载单个文件，也可批量选择后压缩下载。</div><div style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px;"><button class="btn btn-secondary" onclick="downloadSingleFile(\'posts\')">📥 posts.json</button><button class="btn btn-secondary" onclick="downloadSingleFile(\'config\')">📥 config.json</button><button class="btn btn-secondary" onclick="downloadSingleFile(\'messages\')">📥 messages.json</button></div><div style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px;"><label><input type="checkbox" id="backupPosts" checked /> posts.json</label><label><input type="checkbox" id="backupConfig" checked /> config.json</label><label><input type="checkbox" id="backupMessages" checked /> messages.json</label><button class="btn btn-secondary" onclick="toggleAllBackup()">全选/取消</button><button class="btn btn-secondary" onclick="downloadBackup()">📦 下载选中 (ZIP)</button><button class="btn btn-primary" onclick="syncBackupToRepo()">📤 同步到仓库</button><button class="btn btn-secondary" onclick="document.getElementById(\'uploadBackupInput\').click()">📤 上传文件</button><input type="file" id="uploadBackupInput" accept=".json" style="display:none;" onchange="uploadBackupFile(event)" /></div><div id="backupStatus" style="font-size:13px;color:#8a7a6a;">上次备份：<span id="lastBackupTime">暂无</span></div></div></div></div>' +
                '<div class="panel"><div class="panel-header" onclick="togglePanel(this)">💬 评论设置 <span class="arrow">▼</span></div><div class="panel-body"><div class="admin-form"><div class="help-text">💡 使用 Giscus 评论系统（基于 GitHub Discussions）。<a href="https://giscus.app/zh-CN" target="_blank" style="color:#c23531;text-decoration:underline;">点击此处获取配置</a></div><div style="display:flex; gap:10px; align-items:center; margin-bottom:10px;"><label style="font-weight:bold;">自动加载评论</label><input type="checkbox" id="autoLoadComments" /><span style="font-size:13px; color:#8a7a6a;">开启后文章页面自动加载评论区</span></div><div class="form-group"><label>仓库名</label><input type="text" id="giscusRepo" placeholder="用户名/仓库名" style="min-height:38px;" /></div><div class="form-group"><label>Repo ID</label><input type="text" id="giscusRepoId" placeholder="R_xxxxxxxxxx" style="min-height:38px;" /></div><div class="form-group"><label>分类</label><input type="text" id="giscusCategory" placeholder="General" style="min-height:38px;" /></div><div class="form-group"><label>分类 ID</label><input type="text" id="giscusCategoryId" placeholder="DIC_xxxxxxx" style="min-height:38px;" /></div><div class="btn-group"><button class="btn btn-primary" onclick="saveCommentSettings()">保存评论设置</button></div></div></div></div>' +
                '<div class="panel"><div class="panel-header" onclick="togglePanel(this)">💬 留言管理 <span class="arrow">▼</span></div><div class="panel-body"><div class="admin-form"><div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:10px;"><input type="text" id="adminMsgNickname" placeholder="昵称" style="flex:1;min-height:38px;" /><input type="text" id="adminMsgEmail" placeholder="邮箱" style="flex:1;min-height:38px;" /><input type="text" id="adminMsgContent" placeholder="留言内容" style="flex:2;min-height:38px;" /><button class="btn btn-primary" onclick="adminAddMessage()" style="min-height:38px;">添加留言</button></div><div class="admin-list" id="messageAdminList"></div></div></div></div>';

            loadAdminData();
        }

        // ============================================================
        //  加载数据（包含安全设置）
        // ============================================================
        function loadAdminData() {
            loadAllData().then(function() {
                populateCategorySelect();
                populateTagAdminList();
                renderAdminList();
                renderMessageAdminList();
                loadSiteSettingsForm();
                loadFontSettingsForm();
                loadMusicSettingsForm();
                loadSecuritySettings();  // ★★★ 加载安全设置 ★★★
                loadCommentSettings();
                renderCategoryAdmin();
                renderFontAdmin();
                renderMusicAdmin();

                var aboutEditor = document.getElementById('aboutEditor');
                if (aboutEditor) aboutEditor.value = aboutContent;

                var tokenInput = document.getElementById('githubTokenInput');
                var userInput = document.getElementById('githubUserInput');
                var repoInput = document.getElementById('githubRepoInput');
                if (tokenInput) tokenInput.value = config.token;
                if (userInput) userInput.value = config.user;
                if (repoInput) repoInput.value = config.repo;
                var statusEl = document.getElementById('githubConfigStatus');
                if (statusEl) statusEl.textContent = isConfigured() ? '✅ 已配置' : '⚠️ 未配置，请填写';
                var lastBackupEl = document.getElementById('lastBackupTime');
                if (lastBackupEl) lastBackupEl.textContent = lastBackupTime || '暂无';
            });
        }

        // ============================================================
        //  ★★★ 安全设置：加载（从 localStorage 或 DEFAULT_CONFIG）★★★
        // ============================================================
        function loadSecuritySettings() {
            var stored = localStorage.getItem('security_config');
            var sec = stored ? JSON.parse(stored) : null;
            if (!sec) sec = DEFAULT_CONFIG.security || {};
            var pubEl = document.getElementById('secPublicKey');
            var cipherEl = document.getElementById('secChallengeCipher');
            var plainEl = document.getElementById('secExpectedPlain');
            if (pubEl) pubEl.value = sec.publicKey || '';
            if (cipherEl) cipherEl.value = sec.challengeCipher || '';
            if (plainEl) plainEl.value = sec.expectedPlain || '';
        }

        // ============================================================
        //  ★★★ 安全设置：保存（写入 localStorage 和 config.json）★★★
        // ============================================================
        function saveSecuritySettings() {
            var pub = document.getElementById('secPublicKey').value.trim();
            var cipher = document.getElementById('secChallengeCipher').value.trim();
            var plain = document.getElementById('secExpectedPlain').value.trim();
            if (!pub || !cipher || !plain) {
                showToast('所有字段都必须填写', 'error');
                return;
            }
            var sec = { publicKey: pub, challengeCipher: cipher, expectedPlain: plain };
            localStorage.setItem('security_config', JSON.stringify(sec));
            // 同时更新 DEFAULT_CONFIG 以保持一致性
            DEFAULT_CONFIG.security = sec;
            saveConfigData().then(function() {
                showToast('安全设置已保存', 'success');
            }).catch(function(err) {
                showToast('保存到 config.json 失败: ' + err.message, 'error');
            });
        }

        // ============================================================
        //  ★★★ 安全设置：恢复默认 ★★★
        // ============================================================
        function resetSecuritySettings() {
            if (!confirm('恢复默认安全设置？')) return;
            var sec = {
                publicKey: YOUR_PUBLIC_KEY,
                challengeCipher: YOUR_CHALLENGE_CIPHER,
                expectedPlain: YOUR_EXPECTED_PLAIN
            };
            localStorage.setItem('security_config', JSON.stringify(sec));
            DEFAULT_CONFIG.security = sec;
            var pubEl = document.getElementById('secPublicKey');
            var cipherEl = document.getElementById('secChallengeCipher');
            var plainEl = document.getElementById('secExpectedPlain');
            if (pubEl) pubEl.value = sec.publicKey;
            if (cipherEl) cipherEl.value = sec.challengeCipher;
            if (plainEl) plainEl.value = sec.expectedPlain;
            showToast('已恢复默认安全设置', 'info');
        }

        // ============================================================
        //  其他函数（站点设置、文章管理、分类、标签、字体、音乐、备份、评论等）
        //  与之前相同，此处省略以节省篇幅，但实际文件中必须包含它们
        //  下面用占位函数表示，实际部署时请保留完整实现
        // ============================================================
        function togglePanel(header) {
            var body = header.nextElementSibling;
            var arrow = header.querySelector('.arrow');
            if (!body) return;
            if (body.classList.contains('open')) { body.classList.remove('open'); if (arrow) arrow.classList.remove('open'); }
            else { body.classList.add('open'); if (arrow) arrow.classList.add('open'); }
        }

        function loadSiteSettingsForm() {
            var logoEl = document.getElementById('setLogo');
            var titleEl = document.getElementById('setTitle');
            var subEl = document.getElementById('setSub');
            var authorEl = document.getElementById('setAuthor');
            var authorDescEl = document.getElementById('setAuthorDesc');
            if (logoEl) logoEl.value = siteSettings.logo || '墨';
            if (titleEl) titleEl.value = siteSettings.title || '墨韵轩';
            if (subEl) subEl.value = siteSettings.subtitle || '— 青砖檐下 · 笔墨春秋 · 静观自得 —';
            if (authorEl) authorEl.value = siteSettings.authorName || '墨轩主';
            if (authorDescEl) authorDescEl.value = siteSettings.authorDesc || '闲来读书，兴至写文。\n以文会友，以友辅仁。';
        }

        function saveSiteSettings() {
            siteSettings.logo = document.getElementById('setLogo').value.trim();
            siteSettings.title = document.getElementById('setTitle').value.trim();
            siteSettings.subtitle = document.getElementById('setSub').value.trim();
            siteSettings.authorName = document.getElementById('setAuthor').value.trim();
            siteSettings.authorDesc = document.getElementById('setAuthorDesc').value.trim();
            saveConfigData().then(function() { showToast('站点设置已保存', 'success'); });
        }

        // ... 其他所有函数（文章、分类、标签、字体、音乐、备份、评论等）
        // 请从您之前可用的 admin.html 中完整复制过来，这里不再重复

        function initAdmin() {
            if (sessionStorage.getItem('blog_admin_logged') === 'true') { renderAdmin(); }
            else { showLogin(); }
        }

        loadAllData().then(function() {
            initAdmin();
        }).catch(function(err) {
            console.error('数据加载失败，使用默认配置:', err);
            applyConfig(DEFAULT_CONFIG);
            initAdmin();
        });
    </script>
</body>
</html>
