<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>墨韵轩 · 文章管理 (RSA 私钥登录)</title>
    <style>
        /* ========== 精简样式（手机自适应） ========== */
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background-color:#f5f0e8; font-family:'华文楷体','KaiTi','SimSun','宋体',serif; color:#2c2c2c; min-height:100vh; padding:20px; display:flex; justify-content:center; align-items:center; }
        .container { max-width:900px; width:100%; margin:0 auto; background:#fcf9f5; border:1px solid #d5cdc0; border-radius:12px; padding:30px 36px; box-shadow:0 4px 30px rgba(0,0,0,0.10); position:relative; }
        .container::before { content:''; position:absolute; top:0; left:40px; right:40px; height:3px; background:linear-gradient(90deg, transparent, #8b2500, transparent); border-radius:0 0 4px 4px; opacity:0.5; }
        h1 { font-size:28px; font-weight:normal; letter-spacing:6px; text-align:center; color:#2c2c2c; font-family:'华文楷体','KaiTi',serif; }
        .subtitle { text-align:center; font-size:14px; color:#8a9aad; margin-bottom:24px; letter-spacing:2px; font-family:'SimSun','宋体',serif; }

        .login-box { max-width:420px; margin:20px auto; padding:30px 24px; background:#f5f0e8; border-radius:8px; border:1px solid #d5cdc0; }
        .login-box h2 { font-size:22px; font-weight:normal; text-align:center; font-family:'华文楷体','KaiTi',serif; letter-spacing:4px; margin-bottom:6px; color:#2c2c2c; }
        .login-box .login-sub { text-align:center; font-size:13px; color:#8a9aad; margin-bottom:18px; font-family:'SimSun','宋体',serif; letter-spacing:1px; }
        .login-box .form-group { margin-bottom:14px; }
        .login-box .form-group label { display:block; font-size:14px; color:#4a5a6a; margin-bottom:3px; font-family:'SimSun','宋体',serif; font-weight:bold; }
        .login-box .form-group textarea, .login-box .form-group input { width:100%; padding:10px 14px; border:1px solid #d5cdc0; border-radius:6px; background:#fcf9f5; font-size:14px; font-family:'Courier New', monospace; color:#2c2c2c; outline:none; transition:border-color 0.3s; resize:vertical; }
        .login-box .form-group textarea:focus, .login-box .form-group input:focus { border-color:#8b2500; box-shadow:0 0 0 3px rgba(139,37,0,0.10); }
        .login-box .btn { width:100%; padding:10px; border:1px solid #8b2500; border-radius:6px; background:#8b2500; color:#f5f0e8; font-size:16px; font-family:'华文楷体','KaiTi',serif; letter-spacing:4px; cursor:pointer; transition:all 0.3s ease; }
        .login-box .btn:active { transform:scale(0.96); }
        .login-box .btn:hover { background:#6b1a00; border-color:#6b1a00; }
        .login-box .btn:disabled { opacity:0.5; cursor:not-allowed; }
        .login-box .error-msg { color:#8b2500; font-size:14px; text-align:center; margin-top:10px; display:none; font-family:'SimSun','宋体',serif; word-break:break-word; }
        .login-box .file-import-btn { display:inline-block; background:#e0d8cc; border:1px solid #d5cdc0; border-radius:4px; padding:4px 12px; font-size:13px; cursor:pointer; margin-top:6px; }
        .login-box .file-import-btn:active { background:#d5cdc0; }

        .admin-area { display:none; }
        .admin-area.active { display:block; }

        .toast-msg { position:fixed; bottom:40px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:12px 28px; border-radius:8px; font-size:15px; z-index:9999; box-shadow:0 4px 20px rgba(0,0,0,0.3); opacity:0; transition:opacity 0.3s; pointer-events:none; max-width:90%; text-align:center; font-family:'华文楷体','KaiTi',serif; letter-spacing:1px; }
        .toast-msg.show { opacity:1; }

        .info-box { background:#efe8dd; border-radius:6px; padding:12px 16px; font-size:13px; color:#5a5a5a; font-family:'SimSun','宋体',serif; line-height:1.8; margin-bottom:16px; border:1px dashed #d5cdc0; }
        .status-bar { display:flex; justify-content:space-between; align-items:center; background:#f5f0e8; padding:6px 14px; border-radius:6px; margin-bottom:12px; font-size:13px; color:#6b7b8b; font-family:'SimSun','宋体',serif; border:1px solid #e0d8cc; flex-wrap:wrap; gap:6px; }
        .status-bar .user-info { color:#4a5a6a; }
        .status-bar .logout-btn { background:none; border:none; color:#8b2500; cursor:pointer; font-size:13px; font-family:'SimSun','宋体',serif; text-decoration:underline; }
        .status-bar .logout-btn:active { opacity:0.6; }
        .security-badge { display:inline-block; background:#4a5a6a; color:#f5f0e8; font-size:11px; padding:2px 10px; border-radius:12px; font-family:'SimSun','宋体',serif; letter-spacing:0.5px; margin-left:6px; }

        @media (max-width:600px) { .container { padding:18px 14px; } h1 { font-size:22px; letter-spacing:4px; } .login-box { padding:20px 16px; } }
    </style>
</head>
<body>

    <div id="toastContainer" class="toast-msg"></div>

    <div class="container">

        <h1>📝 墨韵轩 · 文章管理</h1>
        <div class="subtitle">— RSA 私钥登录 · 公钥硬编码 —</div>

        <!-- ====== 登录界面 ====== -->
        <div id="loginBox" class="login-box">
            <h2>🔐 后台登录</h2>
            <div class="login-sub">— 使用私钥验证身份 —</div>

            <div id="privateKeyLogin">
                <div class="form-group">
                    <label>🔑 私钥 (PEM 格式)</label>
                    <textarea id="loginPrivateKey" rows="4" placeholder="-----BEGIN PRIVATE KEY----- ... -----END PRIVATE KEY-----"></textarea>
                    <div style="display:flex; gap:8px; margin-top:4px; flex-wrap:wrap;">
                        <span class="file-import-btn" onclick="document.getElementById('privKeyFileInput').click()">📂 从文件导入</span>
                        <span class="file-import-btn" onclick="pastePrivateKey()">📥 粘贴</span>
                        <input type="file" id="privKeyFileInput" accept=".pem,.txt" style="display:none;" onchange="importPrivateKeyFile(event)" />
                    </div>
                </div>
                <button class="btn" id="loginWithPrivateKeyBtn">🔓 使用私钥登录</button>
                <div class="error-msg" id="loginError"></div>
            </div>

            <!-- 备用密码登录（此处略，可沿用之前的） -->
            <div style="text-align:center;margin-top:12px;font-size:12px;color:#b0a8a0;font-family:'SimSun','宋体',serif;">
                🔒 私钥验证 · 公钥硬编码 · 无明文密码
            </div>
        </div>

        <!-- ====== 管理界面（登录后显示） ====== -->
        <div id="adminArea" class="admin-area">
            <div class="status-bar">
                <span class="user-info">👤 管理员已登录 <span class="security-badge">🔒 RSA 私钥</span></span>
                <button class="logout-btn" onclick="handleLogout()">退出登录</button>
            </div>
            <div class="info-box">
                ✅ 登录成功！您可以管理文章了。<br />
                （文章管理功能与之前相同，这里只展示登录验证）
            </div>
            <!-- 文章管理部分省略，可自行添加 -->
        </div>
    </div>

    <script>
        // ============================================================
        // ★ 硬编码公钥（您提供的）
        // ============================================================
        var PUBLIC_KEY_PEM = `-----BEGIN PUBLIC KEY-----
MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAn3GujvExMjKhKErfk8yI
fQIdZ5WTZ8krD4Q0m/b7cbOSaqwnwMMepsSDw2SonkAEEyOCVnKhX1NXoeX56yRJ
7hdoe82RGDLZ3UDUGpdknUSCDeAjblsfzawbEMpNObo/e4TcSh8UKKBtKOdVXGHw
Hzfh6l8PByjsgvd7oi/jXPJ5iKC6PMeiiGKhK6VqAs7AexMviKtICi8ZOZseepSR
olZEVm7zMathz/Mu0XOtSGztEopDeQjsFjIW3nhJnPYiJV+/BCmvn4WuJ9PQM1nW
sjsd/6WGFE/kMuP1wZytb3m7vJLYuxhmOP5uKuwEFm4pa84FwosBInd5nOAtfweL
HQIDAQAB
-----END PUBLIC KEY-----`;

        // ★ 挑战码密文（您提供的，用上面公钥加密 "OK" 得到的完整密文包）
        var CHALLENGE_CIPHER = 'zpXm+kPYtfPIDaaRCufSMrIuJ8//3LlbJEjmOyZA86W9HDJTNlU8lCO/GbOPv/+yQS4S7jlFOLbl3w+1G5EzCuvVKUl1KUzpzXRqUDSpVIZixwxqPY4C90tjlXI5XnzkrdZdpz3FR6ufZdZV9kSp9Av1K+hwOib0qdcDJkS6ETLMwG7fia6V3Enhed6Xwb7jiaR9uLGijvEQlTaUw8V3V1t2A2x7NMczCWxDLT2efgL26IDIBipP51TtqO1cQwE0NQSfrx9siKsPe0xDUkl2aIE0qx0DezZ/5qDNnckM/zIB5fVyHdUbzM+zWBNJ9DRKHNwGiYo64uIrDUXYAnADaMNPZ16AEWeHa6yGyOl1nqiY8B3GRG/NvmM3uQ9uD0itsc0=';

        // ============================================================
        // 核心加解密函数（基于 Web Crypto API）
        // ============================================================
        function base64ToArrayBuffer(base64) {
            var binary = atob(base64);
            var bytes = new Uint8Array(binary.length);
            for (var i = 0; i < binary.length; i++) {
                bytes[i] = binary.charCodeAt(i);
            }
            return bytes.buffer;
        }

        function pemToArrayBuffer(pem, type) {
            var marker = '-----BEGIN ' + type + '-----';
            var footer = '-----END ' + type + '-----';
            var content = pem.trim();
            if (content.includes(marker)) {
                content = content.substring(
                    content.indexOf(marker) + marker.length,
                    content.lastIndexOf(footer)
                );
            }
            return base64ToArrayBuffer(content.replace(/\s/g, ''));
        }

        function importPrivateKey(pem) {
            var buf = pemToArrayBuffer(pem, 'PRIVATE KEY');
            return crypto.subtle.importKey(
                'pkcs8',
                buf,
                { name: 'RSA-OAEP', hash: 'SHA-256' },
                false,
                ['decrypt']
            );
        }

        function hybridDecrypt(base64Package, privateKeyPem) {
            var combinedBuf = base64ToArrayBuffer(base64Package);
            var combined = new Uint8Array(combinedBuf);
            var iv = combined.slice(0, 12);
            var encryptedAESKeyLen = 256;
            if (combined.length < 12 + encryptedAESKeyLen) throw new Error('数据包长度异常');
            var encryptedAESKey = combined.slice(12, 12 + encryptedAESKeyLen);
            var ciphertextWithTag = combined.slice(12 + encryptedAESKeyLen);

            return importPrivateKey(privateKeyPem).then(function(rsaPrivateKey) {
                return crypto.subtle.decrypt(
                    { name: 'RSA-OAEP' },
                    rsaPrivateKey,
                    encryptedAESKey
                ).then(function(aesKeyRaw) {
                    return crypto.subtle.importKey(
                        'raw',
                        aesKeyRaw,
                        { name: 'AES-GCM' },
                        false,
                        ['decrypt']
                    );
                }).then(function(aesKey) {
                    return crypto.subtle.decrypt(
                        { name: 'AES-GCM', iv: iv, tagLength: 128 },
                        aesKey,
                        ciphertextWithTag
                    );
                }).then(function(plaintextBuf) {
                    return new TextDecoder().decode(plaintextBuf);
                });
            });
        }

        // ============================================================
        // 验证函数
        // ============================================================
        function verifyPrivateKey(privateKeyPem) {
            console.log('🔍 开始验证私钥...');
            return hybridDecrypt(CHALLENGE_CIPHER, privateKeyPem)
                .then(function(plain) {
                    console.log('✅ 解密结果:', plain);
                    if (plain === '888999') {
                        return true;
                    } else {
                        throw new Error('解密结果不是 "OK"，而是: ' + plain);
                    }
                })
                .catch(function(err) {
                    console.error('❌ 验证失败:', err);
                    document.getElementById('loginError').textContent = '❌ ' + err.message;
                    document.getElementById('loginError').style.display = 'block';
                    return false;
                });
        }

        // ============================================================
        // 登录处理
        // ============================================================
        function handlePrivateKeyLogin() {
            var privKey = document.getElementById('loginPrivateKey').value.trim();
            var errorEl = document.getElementById('loginError');

            if (!privKey) {
                errorEl.textContent = '❌ 请粘贴或导入私钥';
                errorEl.style.display = 'block';
                return;
            }

            var btn = document.getElementById('loginWithPrivateKeyBtn');
            btn.disabled = true;
            btn.textContent = '⏳ 验证中...';

            verifyPrivateKey(privKey).then(function(success) {
                btn.disabled = false;
                btn.textContent = '🔓 使用私钥登录';
                if (success) {
                    // 登录成功
                    sessionStorage.setItem('blog_admin_logged', 'true');
                    errorEl.style.display = 'none';
                    document.getElementById('loginBox').style.display = 'none';
                    document.getElementById('adminArea').classList.add('active');
                    showToast('✅ 私钥验证通过，登录成功', 'success');
                } else {
                    document.getElementById('loginPrivateKey').value = '';
                    document.getElementById('loginPrivateKey').focus();
                }
            });
        }

        // ============================================================
        // 退出登录
        // ============================================================
        function handleLogout() {
            if (confirm('确定退出登录吗？')) {
                sessionStorage.removeItem('blog_admin_logged');
                document.getElementById('loginBox').style.display = 'block';
                document.getElementById('adminArea').classList.remove('active');
                showToast('已退出', 'info');
            }
        }

        // ============================================================
        // Toast 提示
        // ============================================================
        var toastEl = document.getElementById('toastContainer');
        var toastTimer = null;
        function showToast(msg, type) {
            toastEl.textContent = msg;
            toastEl.style.background = type === 'success' ? '#4a5a6a' : (type === 'error' ? '#8b2500' : '#333');
            toastEl.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(function() { toastEl.classList.remove('show'); }, 3000);
        }

        // ============================================================
        // 私钥导入辅助
        // ============================================================
        function pastePrivateKey() {
            navigator.clipboard.readText().then(function(text) {
                if (text) {
                    document.getElementById('loginPrivateKey').value = text;
                    showToast('私钥已粘贴', 'success');
                } else {
                    showToast('剪贴板为空', 'error');
                }
            }).catch(function() {
                showToast('无法读取剪贴板，请手动粘贴', 'error');
            });
        }

        function importPrivateKeyFile(event) {
            var file = event.target.files[0];
            if (!file) return;
            var reader = new FileReader();
            reader.onload = function(e) {
                var content = e.target.result;
                if (content.includes('BEGIN PRIVATE KEY')) {
                    document.getElementById('loginPrivateKey').value = content;
                    showToast('私钥文件导入成功', 'success');
                } else {
                    showToast('文件内容不是有效的私钥', 'error');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        // ============================================================
        // 绑定登录按钮
        // ============================================================
        document.getElementById('loginWithPrivateKeyBtn').addEventListener('click', handlePrivateKeyLogin);

        // 检测是否已登录（页面刷新时保持）
        if (sessionStorage.getItem('blog_admin_logged') === 'true') {
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('adminArea').classList.add('active');
        }

        console.log('📝 墨韵轩 · 文章管理 (RSA 私钥登录) 已加载');
        console.log('🔑 请使用您的私钥登录');
        console.log('💡 如果私钥登录失败，请查看控制台错误信息');
    </script>

</body>
</html>
